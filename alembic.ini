# Alembic 配置：迁移脚本目录为 ./alembic
# 实际连接串在 env.py 中由 backend.config.get_mysql_sync_migration_url() 注入（与 .env 一致）

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# 占位；运行迁移时由 env.py 覆盖
sqlalchemy.url = mysql+pymysql://placeholder:placeholder@127.0.0.1:3306/placeholder

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
