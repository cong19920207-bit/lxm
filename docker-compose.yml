# 本地开发：MySQL / Redis / Backend / Nginx。
# - H5（经 nginx:80）：./frontend 挂载，改文件强刷即生效。
# - 管理后台（/admin 反代 backend）：./admin 挂载到 backend /app/admin，改 HTML/JS 后刷新即可；改 backend/ 或 requirements 须 build。
# - 直连 :8000 时 H5 静态与页面：./frontend 同样挂载到 backend /app/frontend（与 nginx 一致，免 rebuild）。
# - 生活流（M1）：.env 须含 DEEPSEEK_* / LIBLIB_* / OSS_* / FEED_IMAGE_REFERENCE_PUBLIC_URL；库结构 v6a→v6e 见 alembic。
# - 角色知识库（STEP-027）：依赖 .env 中 DASHVECTOR_* 与 Embedding。
# 库结构升级：docker compose build backend && docker compose exec backend alembic upgrade head（见 docs/ops/docker-admin-deploy.md）。
# 容器系统时区：与杭州一致（Asia/Shanghai）。APScheduler 日记/清零等 Cron 在代码中仍使用 UTC，不受此处影响。

services:
  mysql:
    image: mysql:8.0
    container_name: lxm_mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lxm}
      MYSQL_USER: ${MYSQL_USER:-lxm}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-lxm123456}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$${MYSQL_ROOT_PASSWORD}\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: lxm_redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: .
    container_name: lxm_backend
    restart: unless-stopped
    ports:
      # 可选：浏览器直连 FastAPI（管理后台 /admin、OpenAPI 等）；主入口仍建议走 nginx:80
      - "8000:8000"
    env_file: .env
    environment:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: "1"
      MYSQL_HOST: mysql
      REDIS_HOST: redis
    volumes:
      # 管理后台静态与页面：本地改 admin/ 无需每次 rebuild（API 仍在 backend/ 镜像内）
      - ./admin:/app/admin:ro
      # H5 静态与页面：直连 :8000 或与 nginx 保持一致；朋友圈 feed.html / 参考图 base.png 等
      - ./frontend:/app/frontend:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: lxm_nginx
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
