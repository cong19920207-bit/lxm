# 林小梦 AI 虚拟人 - Nginx 配置
# 托管前端静态资源，反向代理 /api 到 Backend
# 安全（N8）：access_log / log_format 禁止记录 $http_authorization，避免 API Key / JWT 落盘

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;

        # 根路径重定向到首页
        location = / {
            return 302 /pages/index.html;
        }

        # 前端静态：/pages/、/static/ 由 root 自动处理

        # 管理后台：页面与 /admin/static 由 FastAPI 提供，统一反代到 Backend
        location /admin {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API 反向代理到 Backend
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE 流式对话需关闭缓冲，保持长连接
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
            chunked_transfer_encoding off;
        }
    }
}
