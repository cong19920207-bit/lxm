<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent 主动 P0～P4 - 对话流 Prompt</title>
  <link rel="stylesheet" href="/admin/static/css/admin-common.css?v=observer-v1-20260716">
  <style>
    .hint-ro { font-size: 13px; color: #876800; background: #fffbe6; border: 1px solid #ffe58f; border-radius: 4px; padding: 10px 12px; margin-bottom: 16px; line-height: 1.6; }
    .prompt-pre { white-space: pre-wrap; word-break: break-word; font-family: monospace, Consolas, Menlo, monospace; font-size: 12px; line-height: 1.5; max-height: 60vh; overflow: auto; margin: 0; background: #fafafa; border: 1px solid #f0f0f0; border-radius: 4px; padding: 12px; }
    .src-meta { font-size: 12px; color: #888; margin: 8px 0 16px; }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>
<div class="admin-content">
  <div id="header-mount"></div>
  <div class="page-card">
    <div class="hint-ro">只读展示 · 规则触发主动消息（非 Step8 Future）· System/Persona 复用主链配置。</div>
    <p class="src-meta" id="src-meta">加载中…</p>
    <div class="tabs" id="main-tabs"></div>
    <div id="pane-mount"></div>
  </div>
</div>
<script src="/admin/static/js/admin-api.js?v=observer-v1-20260716"></script>
<script>
(function () {
  var ROLES = ['super_admin', 'ai_trainer', 'observer'];
  var triggers = [];
  function renderTabs() {
    var tabs = document.getElementById('main-tabs');
    var mount = document.getElementById('pane-mount');
    var th = '';
    var ph = '';
    for (var i = 0; i < triggers.length; i++) {
      var t = triggers[i];
      var active = i === 0 ? ' active' : '';
      th += '<div class="tab-item' + active + '" data-target="pane-' + t.key + '">' + t.key + '</div>';
      ph += '<div id="pane-' + t.key + '" class="tab-pane' + (i === 0 ? ' active' : '') + '">' +
        '<pre class="prompt-pre">' + (t.full_task_block || '').replace(/</g, '&lt;') + '</pre></div>';
    }
    tabs.innerHTML = th;
    mount.innerHTML = ph;
    initTabs('main-tabs');
  }
  document.addEventListener('DOMContentLoaded', async function () {
    if (!checkAdminLogin()) return;
    if (ROLES.indexOf(getAdminRole()) < 0) {
      window.location.href = '/admin/pages/error.html?type=403';
      return;
    }
    document.getElementById('sidebar-mount').innerHTML = renderSidebar('cp-agent');
    document.getElementById('header-mount').innerHTML = renderHeader('Agent 主动 P0～P4');
    var r = await adminRequest('GET', '/api/admin/chat-prompt-view/agent');
    if (!r || r.code !== 0) return;
    var d = r.data || {};
    document.getElementById('src-meta').textContent =
      (d.description || '') + ' · 源文件：' + (d.source_file || '');
    triggers = d.triggers || [];
    renderTabs();
  });
})();
</script>
</body>
</html>
