<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Step3 Prompt 拼装 - 对话流 Prompt</title>
  <link rel="stylesheet" href="/admin/static/css/admin-common.css?v=observer-v1-20260716">
  <style>
    .hint-ro { font-size: 13px; color: #876800; background: #fffbe6; border: 1px solid #ffe58f; border-radius: 4px; padding: 10px 12px; margin-bottom: 16px; line-height: 1.6; }
    .block-title { font-size: 14px; font-weight: 600; margin: 20px 0 10px; }
    .prompt-pre { white-space: pre-wrap; word-break: break-word; font-family: monospace, Consolas, Menlo, monospace; font-size: 12px; line-height: 1.5; max-height: 320px; overflow: auto; margin: 0; background: #fafafa; border: 1px solid #f0f0f0; border-radius: 4px; padding: 12px; }
    .src-meta { font-size: 12px; color: #888; margin: 8px 0 16px; }
    .mod-table td, .mod-table th { font-size: 13px; }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>
<div class="admin-content">
  <div id="header-mount"></div>
  <div class="page-card">
    <div class="hint-ro">只读展示 · System / Persona 请分别在 Step5 / 人格管理配置 · 本页仅为拼装规则与硬编码注入文案。</div>
    <p class="src-meta" id="src-meta">加载中…</p>

    <div class="block-title">模块拼装顺序</div>
    <table class="admin-table mod-table" id="tbl-modules"><thead><tr><th>#</th><th>模块</th><th>说明</th><th>默认 Token</th></tr></thead><tbody></tbody></table>

    <div class="block-title">裁剪优先级（先裁 → 后裁）</div>
    <pre class="prompt-pre" id="pre-trim">—</pre>

    <div class="block-title">共情规则 EMPATHY_RULES</div>
    <pre class="prompt-pre" id="pre-empathy">—</pre>

    <div class="block-title">情绪映射 EMOTION_MAPPING</div>
    <pre class="prompt-pre" id="pre-emotion-map">—</pre>

    <div class="block-title">关系等级语气 LEVEL_DEFINITIONS</div>
    <pre class="prompt-pre" id="pre-levels">—</pre>

    <div class="block-title">沉默修正</div>
    <pre class="prompt-pre" id="pre-silence">—</pre>
  </div>
</div>
<script src="/admin/static/js/admin-api.js?v=observer-v1-20260716"></script>
<script>
(function () {
  var ROLES = ['super_admin', 'ai_trainer', 'observer'];
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  document.addEventListener('DOMContentLoaded', async function () {
    if (!checkAdminLogin()) return;
    if (ROLES.indexOf(getAdminRole()) < 0) {
      window.location.href = '/admin/pages/error.html?type=403';
      return;
    }
    document.getElementById('sidebar-mount').innerHTML = renderSidebar('cp-step3');
    document.getElementById('header-mount').innerHTML = renderHeader('Step3 Prompt 拼装');
    var r = await adminRequest('GET', '/api/admin/chat-prompt-view/step3');
    if (!r || r.code !== 0) return;
    var d = r.data || {};
    document.getElementById('src-meta').textContent =
      (d.description || '') + ' · 源文件：' + (d.source_file || '');
    var tb = document.querySelector('#tbl-modules tbody');
    var mods = d.module_order || [];
    var html = '';
    for (var i = 0; i < mods.length; i++) {
      var m = mods[i];
      html += '<tr><td>' + (i + 1) + '</td><td><code>' + esc(m.key) + '</code></td><td>' +
        esc(m.label) + '</td><td>' + esc(m.token_limit_default) + '</td></tr>';
    }
    tb.innerHTML = html;
    document.getElementById('pre-trim').textContent = (d.trim_priority || []).join(' → ');
    document.getElementById('pre-empathy').textContent = JSON.stringify(d.empathy_rules || {}, null, 2);
    document.getElementById('pre-emotion-map').textContent = JSON.stringify(d.emotion_mapping || {}, null, 2);
    var levels = d.level_definitions || [];
    var lvLines = levels.map(function (x) {
      return 'Lv' + x.level + ' ' + x.name + '：' + x.behavior;
    });
    document.getElementById('pre-levels').textContent = lvLines.join('\n\n');
    var sc = d.silence_corrections || [];
    document.getElementById('pre-silence').textContent = sc.map(function (x) {
      return '[' + x.range + ']\n' + x.text;
    }).join('\n\n');
  });
})();
</script>
</body>
</html>
