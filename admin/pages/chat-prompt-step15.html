<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Step1.5 查询重写 - 对话流 Prompt</title>
  <link rel="stylesheet" href="/admin/static/css/admin-common.css">
  <style>
    .hint-ro { font-size: 13px; color: #876800; background: #fffbe6; border: 1px solid #ffe58f; border-radius: 4px; padding: 10px 12px; margin-bottom: 16px; line-height: 1.6; }
    .prompt-pre { white-space: pre-wrap; word-break: break-word; font-family: monospace, Consolas, Menlo, monospace; font-size: 12px; line-height: 1.5; max-height: 70vh; overflow: auto; margin: 0; background: #fafafa; border: 1px solid #f0f0f0; border-radius: 4px; padding: 12px; }
    .src-meta { font-size: 12px; color: #888; margin: 8px 0 16px; }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>
<div class="admin-content">
  <div id="header-mount"></div>
  <div class="page-card">
    <div class="hint-ro">只读展示 · 与运行时代码同源 · 不可编辑 / 不可发布。动态字段以 <code>{{占位符}}</code> 表示。</div>
    <p class="src-meta" id="src-meta">加载中…</p>
    <div class="tabs" id="main-tabs">
      <div class="tab-item active" data-target="pane-main">主链</div>
      <div class="tab-item" data-target="pane-step8">Step8 分支</div>
    </div>
    <div id="pane-main" class="tab-pane active">
      <pre class="prompt-pre" id="pre-main">加载中…</pre>
    </div>
    <div id="pane-step8" class="tab-pane">
      <pre class="prompt-pre" id="pre-step8">加载中…</pre>
    </div>
  </div>
</div>
<script src="/admin/static/js/admin-api.js"></script>
<script>
(function () {
  var ROLES = ['super_admin', 'ai_trainer'];
  document.addEventListener('DOMContentLoaded', async function () {
    if (!checkAdminLogin()) return;
    if (ROLES.indexOf(getAdminRole()) < 0) {
      window.location.href = '/admin/pages/error.html?type=403';
      return;
    }
    document.getElementById('sidebar-mount').innerHTML = renderSidebar('cp-step15');
    document.getElementById('header-mount').innerHTML = renderHeader('Step1.5 查询重写');
    initTabs('main-tabs');
    var r = await adminRequest('GET', '/api/admin/chat-prompt-view/step15');
    if (!r || r.code !== 0) {
      document.getElementById('pre-main').textContent = '加载失败';
      return;
    }
    var d = r.data || {};
    document.getElementById('src-meta').textContent =
      (d.description || '') + ' · 源文件：' + (d.source_file || '');
    var variants = d.variants || [];
    for (var i = 0; i < variants.length; i++) {
      if (variants[i].key === 'main') {
        document.getElementById('pre-main').textContent = variants[i].content || '';
      }
      if (variants[i].key === 'step8') {
        document.getElementById('pre-step8').textContent = variants[i].content || '';
      }
    }
  });
})();
</script>
</body>
</html>
