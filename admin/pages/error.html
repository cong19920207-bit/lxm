<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出错了 - 林小梦管理后台</title>
  <link rel="stylesheet" href="/admin/static/css/admin-common.css?v=observer-v1-20260716">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }

    .error-card {
      text-align: center;
      background: var(--white);
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      padding: 60px 48px;
      min-width: 360px;
    }

    .error-icon {
      font-size: 56px;
      margin-bottom: 16px;
      line-height: 1;
    }

    .error-title {
      font-size: 20px;
      font-weight: bold;
      color: var(--text);
      margin-bottom: 8px;
    }

    .error-desc {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    .error-btn {
      display: inline-block;
      height: 40px;
      line-height: 40px;
      padding: 0 28px;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }

    .error-btn:hover {
      background: #40a9ff;
      color: var(--white);
    }
  </style>
</head>
<body>

<div class="error-card">
  <div class="error-icon" id="errorIcon"></div>
  <div class="error-title" id="errorTitle"></div>
  <div class="error-desc" id="errorDesc"></div>
  <a class="error-btn" href="/admin/pages/dashboard.html">返回首页</a>
</div>

<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var type = params.get('type') || '';

    var iconEl = document.getElementById('errorIcon');
    var titleEl = document.getElementById('errorTitle');
    var descEl = document.getElementById('errorDesc');

    var map = {
      '403': {
        icon: '\uD83D\uDEAB',
        title: '权限不足',
        desc: '您没有权限访问此页面，请联系管理员'
      },
      '404': {
        icon: '\uD83D\uDD0D',
        title: '页面不存在',
        desc: '您访问的页面不存在或已被移除'
      }
    };

    var info = map[type] || {
      icon: '\u26A0\uFE0F',
      title: '出错了',
      desc: '页面发生了意料之外的错误，请稍后重试'
    };

    iconEl.textContent = info.icon;
    titleEl.textContent = info.title;
    descEl.textContent = info.desc;

    document.title = info.title + ' - 林小梦管理后台';
  })();
</script>
</body>
</html>
