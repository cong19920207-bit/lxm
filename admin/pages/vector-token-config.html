<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>召回与 Token 配置 - 林小梦管理后台</title>
  <link rel="stylesheet" href="/admin/static/css/admin-common.css">
  <style>
    .vt-tab-header-card {
      padding-bottom: 0;
      margin-bottom: 16px;
    }
    .vt-tab-header-card .tabs {
      margin-bottom: 0;
    }
    .vt-form-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .vt-form-row .form-item {
      margin-bottom: 0;
      min-width: 200px;
    }
    .vt-hint {
      font-size: 13px;
      color: #666;
      margin-top: 8px;
      line-height: 1.5;
    }
    .vt-token-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px 20px;
      margin-top: 8px;
    }
    .vt-token-grid .form-item {
      margin-bottom: 0;
    }
    .vt-token-grid label {
      font-size: 13px;
    }
    #vt-page-wrap.is-loading .vt-disable-while-load {
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="sidebar-mount"></div>
<div class="admin-content">
  <div id="header-mount"></div>

  <div id="vt-page-wrap" class="is-loading">
    <div class="page-card vt-tab-header-card">
      <div class="tabs" id="vt-tabs">
        <div class="tab-item active" data-target="pane-vt-vector">🔎 向量召回</div>
        <div class="tab-item" data-target="pane-vt-token">📐 Prompt Token</div>
      </div>
    </div>

    <!-- Tab：向量召回（与 Step2 热配置一致） -->
    <div id="pane-vt-vector" class="tab-pane active page-card vt-disable-while-load">
      <p class="vt-hint">对应 <code>admin_config</code> 键 <code>vector_retrieval_config</code>。保存时仅提交相对上次加载有变化的字段（部分 PATCH）。全路统一 TopK 与相似度阈值。</p>
      <div class="vt-form-row">
        <div class="form-item">
          <label>TopK（1–20）</label>
          <input type="number" id="vt-top-k" class="form-control" min="1" max="20" step="1">
        </div>
        <div class="form-item">
          <label>相似度阈值（0–1）</label>
          <input type="number" id="vt-threshold" class="form-control" min="0" max="1" step="0.01">
        </div>
      </div>
      <div class="form-item mt-16">
        <button type="button" class="btn btn-primary" id="btn-save-vector">保存向量召回配置</button>
      </div>
    </div>

    <!-- Tab：Prompt Token（与 R-L1L3-19 模块上限一致） -->
    <div id="pane-vt-token" class="tab-pane page-card vt-disable-while-load">
      <p class="vt-hint">对应 <code>admin_config</code> 键 <code>prompt_token_config</code>。保存时仅提交有变化的字段；未改动的模块继续沿用库中或代码默认值。</p>
      <div class="form-item">
        <label>总 Token 上限 <code>max_total</code></label>
        <input type="number" id="vt-max-total" class="form-control" style="max-width:200px" min="1" max="50000" step="1">
      </div>
      <div class="vt-token-grid" id="vt-token-modules"></div>
      <div class="form-item mt-16">
        <button type="button" class="btn btn-primary" id="btn-save-token">保存 Token 配置</button>
      </div>
    </div>
  </div>
</div>

<script src="/admin/static/js/admin-api.js"></script>
<script>
(function () {
  var ALLOWED_ROLES = ['super_admin', 'ai_trainer'];

  // 各模块字段顺序（与后端 MODULE_TOKEN_LIMITS 一致）
  var TOKEN_MODULE_KEYS = [
    'system', 'persona', 'character_knowledge', 'relationship',
    'memory', 'emotion', 'time_activity', 'recent_chat', 'user_input'
  ];
  var TOKEN_LABELS = {
    system: 'System',
    persona: 'Persona',
    character_knowledge: '角色设定与知识',
    relationship: 'Relationship',
    memory: 'User Memory',
    emotion: 'Emotion',
    time_activity: '时间与活动',
    recent_chat: 'Recent Chat',
    user_input: 'User Input'
  };

  var snapVector = { top_k: 3, threshold: 0.7 };
  var snapToken = {};

  function numOr(val, fallback) {
    var n = Number(val);
    return isNaN(n) ? fallback : n;
  }

  function readVectorFromForm() {
    return {
      top_k: parseInt(document.getElementById('vt-top-k').value, 10),
      threshold: Number(document.getElementById('vt-threshold').value)
    };
  }

  function readTokenFromForm() {
    var o = { max_total: parseInt(document.getElementById('vt-max-total').value, 10) };
    for (var i = 0; i < TOKEN_MODULE_KEYS.length; i++) {
      var k = TOKEN_MODULE_KEYS[i];
      var el = document.getElementById('vt-tok-' + k);
      if (el) o[k] = parseInt(el.value, 10);
    }
    return o;
  }

  /** 与快照比较，构造 PATCH 请求体（仅变更字段） */
  function buildVectorPatch(current) {
    var p = {};
    if (current.top_k !== snapVector.top_k) p.top_k = current.top_k;
    if (current.threshold !== snapVector.threshold) p.threshold = current.threshold;
    return p;
  }

  function buildTokenPatch(current) {
    var p = {};
    if (current.max_total !== snapToken.max_total) p.max_total = current.max_total;
    for (var i = 0; i < TOKEN_MODULE_KEYS.length; i++) {
      var k = TOKEN_MODULE_KEYS[i];
      if (current[k] !== snapToken[k]) p[k] = current[k];
    }
    return p;
  }

  function renderTokenInputs(data) {
    var host = document.getElementById('vt-token-modules');
    if (!host) return;
    host.innerHTML = '';
    for (var i = 0; i < TOKEN_MODULE_KEYS.length; i++) {
      var k = TOKEN_MODULE_KEYS[i];
      var wrap = document.createElement('div');
      wrap.className = 'form-item';
      wrap.innerHTML =
        '<label>' + (TOKEN_LABELS[k] || k) + ' <code>' + k + '</code></label>' +
        '<input type="number" class="form-control" id="vt-tok-' + k + '" min="1" max="20000" step="1">';
      host.appendChild(wrap);
      document.getElementById('vt-tok-' + k).value = String(data[k] != null ? data[k] : '');
    }
  }

  async function loadVector() {
    var res = await adminRequest('GET', '/api/admin/configs/vector_retrieval_config');
    if (!res || res.code !== 0 || !res.data) return;
    var d = res.data;
    snapVector.top_k = numOr(d.top_k, 3);
    snapVector.threshold = numOr(d.threshold, 0.7);
    document.getElementById('vt-top-k').value = String(snapVector.top_k);
    document.getElementById('vt-threshold').value = String(snapVector.threshold);
  }

  async function loadToken() {
    var res = await adminRequest('GET', '/api/admin/configs/prompt_token_config');
    if (!res || res.code !== 0 || !res.data) return;
    var d = res.data;
    snapToken = {};
    snapToken.max_total = numOr(d.max_total, 7373);
    document.getElementById('vt-max-total').value = String(snapToken.max_total);
    for (var i = 0; i < TOKEN_MODULE_KEYS.length; i++) {
      var k = TOKEN_MODULE_KEYS[i];
      snapToken[k] = numOr(d[k], 0);
    }
    renderTokenInputs(snapToken);
  }

  async function loadAll() {
    await Promise.all([loadVector(), loadToken()]);
  }

  document.addEventListener('DOMContentLoaded', function () {
    if (!checkAdminLogin()) return;
    if (ALLOWED_ROLES.indexOf(getAdminRole()) < 0) {
      window.location.href = '/admin/pages/error.html?type=403';
      return;
    }

    document.getElementById('sidebar-mount').innerHTML = renderSidebar('vector-token');
    document.getElementById('header-mount').innerHTML = renderHeader('召回与 Token 配置');

    initTabs('vt-tabs');

    document.getElementById('btn-save-vector').onclick = async function () {
      var cur = readVectorFromForm();
      if (cur.top_k < 1 || cur.top_k > 20) {
        showToast('TopK 须为 1–20 的整数', 'warning');
        return;
      }
      if (isNaN(cur.threshold) || cur.threshold < 0 || cur.threshold > 1) {
        showToast('阈值须为 0–1 之间的数字', 'warning');
        return;
      }
      var patch = buildVectorPatch(cur);
      if (Object.keys(patch).length === 0) {
        showToast('没有检测到变更', 'info');
        return;
      }
      var res = await adminRequest('PUT', '/api/admin/configs/vector_retrieval_config', patch);
      if (res && res.code === 0) {
        showToast('向量召回配置已保存', 'success');
        await loadVector();
      }
    };

    document.getElementById('btn-save-token').onclick = async function () {
      var cur = readTokenFromForm();
      if (isNaN(cur.max_total) || cur.max_total < 1) {
        showToast('max_total 须为正整数', 'warning');
        return;
      }
      for (var i = 0; i < TOKEN_MODULE_KEYS.length; i++) {
        var k = TOKEN_MODULE_KEYS[i];
        if (isNaN(cur[k]) || cur[k] < 1) {
          showToast('模块「' + (TOKEN_LABELS[k] || k) + '」须为正整数', 'warning');
          return;
        }
      }
      var patch = buildTokenPatch(cur);
      if (Object.keys(patch).length === 0) {
        showToast('没有检测到变更', 'info');
        return;
      }
      var res = await adminRequest('PUT', '/api/admin/configs/prompt_token_config', patch);
      if (res && res.code === 0) {
        showToast('Prompt Token 配置已保存', 'success');
        await loadToken();
      }
    };

    loadAll().then(function () {
      var wrap = document.getElementById('vt-page-wrap');
      if (wrap) wrap.classList.remove('is-loading');
    });
  });
})();
</script>
</body>
</html>
