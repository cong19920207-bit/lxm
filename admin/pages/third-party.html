<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第三方服务监控 - 林小梦管理后台</title>
  <link rel="stylesheet" href="/admin/static/css/admin-common.css?v=observer-v1-20260716">
  <style>
    #service-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .tp-card {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }

    .tp-card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .tp-card-title {
      font-size: 15px;
      font-weight: 600;
    }

    .tp-status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .tp-status-dot.normal { background: #52c41a; }
    .tp-status-dot.warning { background: #faad14; }
    .tp-status-dot.error { background: #ff4d4f; }
    .tp-status-dot.unknown { background: #d9d9d9; }

    .tp-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid #f8f8f8;
    }

    .tp-row:last-child {
      border-bottom: none;
    }

    .tp-progress-wrap {
      flex: 1;
      margin: 0 10px;
      height: 6px;
      background: #f0f0f0;
      border-radius: 3px;
      overflow: hidden;
    }

    .tp-progress-fill {
      height: 100%;
      border-radius: 3px;
    }

    .tp-card-foot {
      margin-top: 14px;
      display: flex;
      justify-content: flex-end;
    }

    #service-grid .skeleton {
      height: 200px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<script src="/admin/static/js/admin-api.js?v=observer-v1-20260716"></script>
<script>
(function () {
  if (!checkAdminLogin()) return;

  var ALLOWED_ROLES = ['super_admin', 'tech_ops', 'observer'];
  if (ALLOWED_ROLES.indexOf(getAdminRole()) < 0) {
    window.location.href = '/admin/pages/error.html?type=403';
    return;
  }

  /* 与后端 _VALID_SERVICES 路径一致 */
  var SERVICE_KEY_MAP = {
    'LLM（豆包）': 'doubao',
    'Embedding（阿里云）': 'embedding',
    'DashVector（向量检索）': 'dashvector',
    '内容安全': 'content_safety'
  };

  var currentSvcKey = '';
  var configTestPassed = {};
  var refreshTimer = null;
  var observerView = getAdminRole() === 'observer';

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function getSvcKey(name) {
    return SERVICE_KEY_MAP[name] || '';
  }

  function statusDotClass(st) {
    if (st === 'normal' || st === 'warning' || st === 'error' || st === 'unknown') return st;
    return 'unknown';
  }

  function renderStandardCard(s, svcKey) {
    var rate = Number(s.success_rate);
    if (isNaN(rate)) rate = 0;
    var fillColor = rate < 90 ? '#ff4d4f' : '#1890ff';
    var avgMs = Number(s.avg_response_ms);
    var avgStyle = (!isNaN(avgMs) && avgMs > 5000) ? ' style="color:var(--danger)"' : '';
    var dn = escapeHtml(s.name);
    var h = '';
    h += '<div class="tp-card" data-svc-card="' + escapeHtml(svcKey) + '">';
    h += '<div class="tp-card-head"><span class="tp-card-title">' + dn + '</span>';
    h += '<span class="tp-status-dot ' + statusDotClass(s.status) + '" title="' + escapeHtml(s.status || '') + '"></span></div>';
    h += '<div class="tp-row"><span>今日调用次数</span><span>' + (s.today_calls != null ? s.today_calls : '—') + ' 次</span></div>';
    h += '<div class="tp-row"><span>成功率</span><div style="display:flex;align-items:center;flex:1;min-width:0">';
    h += '<div class="tp-progress-wrap"><div class="tp-progress-fill" style="width:' + rate + '%;background:' + fillColor + '"></div></div>';
    var pctStyle = rate < 90 ? ' style="white-space:nowrap;color:var(--danger)"' : ' style="white-space:nowrap"';
    h += '<span' + pctStyle + '>' + rate + '%</span></div></div>';
    h += '<div class="tp-row"><span>平均响应</span><span' + avgStyle + '>' + (s.avg_response_ms != null ? s.avg_response_ms : '—') + ' ms</span></div>';
    if (s.credential_configured !== undefined) {
      h += '<div class="tp-row"><span>凭据状态</span><span>' + (s.credential_configured ? '已配置' : '未配置') + '</span></div>';
    }
    if (!observerView) {
      h += '<div class="tp-card-foot"><button type="button" class="btn btn-default btn-sm tp-config-btn" data-write-action data-display-name="' + escapeHtml(s.name) + '" data-svc-key="' + escapeHtml(svcKey) + '">配置</button></div>';
    }
    h += '</div>';
    return h;
  }

  function renderContentSafetyCard(s, svcKey) {
    /* TD-003: 内容安全服务无真实第三方后端，仅检查 Redis 连通性 */
    var dn = escapeHtml(s.name);
    var h = '';
    h += '<div class="tp-card" data-svc-card="' + escapeHtml(svcKey) + '">';
    h += '<div class="tp-card-head"><span class="tp-card-title">' + dn + '</span>';
    h += '<span class="tp-status-dot ' + statusDotClass(s.status) + '"></span></div>';
    h += '<div class="tp-row"><span>今日拦截次数</span><span>' + (s.today_blocked != null ? s.today_blocked : '—') + ' 次</span></div>';
    h += '<div class="tp-row"><span>成功率</span><span style="color:#bbb">—</span></div>';
    h += '<div class="tp-row"><span>平均响应</span><span style="color:#bbb">—</span></div>';
    if (!observerView) {
      h += '<div class="tp-card-foot"><button type="button" class="btn btn-default btn-sm tp-config-btn" data-write-action data-display-name="' + escapeHtml(s.name) + '" data-svc-key="' + escapeHtml(svcKey) + '">配置</button></div>';
    }
    h += '</div>';
    return h;
  }

  function renderServiceCards(services) {
    var grid = document.getElementById('service-grid');
    if (!grid) return;
    var h = '';
    for (var i = 0; i < services.length; i++) {
      var s = services[i];
      var svcKey = getSvcKey(s.name);
      if (!svcKey) continue;
      if (svcKey === 'content_safety') {
        h += renderContentSafetyCard(s, svcKey);
      } else {
        h += renderStandardCard(s, svcKey);
      }
    }
    grid.innerHTML = h;
  }

  async function refreshThirdPartyStatus() {
    var res = await adminRequest('GET', '/api/admin/third-party/status');
    if (res && res.code === 0 && res.data && res.data.services) {
      renderServiceCards(res.data.services);
    }
  }

  function onModalFieldChange() {
    if (currentSvcKey === 'content_safety') return;
    configTestPassed[currentSvcKey] = false;
    var smb = document.getElementById('modal-save-btn');
    if (smb) smb.disabled = true;
  }

  function openConfigModal(displayName, svcKey) {
    currentSvcKey = svcKey;
    configTestPassed[svcKey] = false;

    var modal = document.getElementById('config-modal');
    var titleEl = document.getElementById('config-modal-title');
    var bodyEl = document.getElementById('config-modal-body');
    var footEl = document.getElementById('config-modal-footer');
    if (!modal || !titleEl || !bodyEl || !footEl) return;

    titleEl.textContent = displayName + ' 配置';

    if (svcKey === 'content_safety') {
      bodyEl.innerHTML =
        '<div class="alert alert-info" style="margin-bottom:12px">' +
        '该服务基于项目内置 Redis，通过 Redis 关键词列表实现内容安全检测，' +
        '无需单独配置 Endpoint 或 API Key。</div>' +
        '<div id="content-safety-test-result" style="display:none"></div>';
      footEl.innerHTML =
        '<button type="button" class="btn btn-default" id="modal-test-redis-btn" data-write-action>测试 Redis 连通性</button>' +
        '<button type="button" class="btn btn-default" id="modal-close-only-btn">关闭</button>';
    } else {
      bodyEl.innerHTML =
        '<div class="form-item"><label>Endpoint</label>' +
        '<input type="url" id="modal-endpoint" data-write-action class="form-control" placeholder="https://..." autocomplete="off"></div>' +
        '<div class="form-item"><label>API Key</label>' +
        '<input type="password" id="modal-apikey" data-write-action class="form-control" placeholder="留空则保留原值" autocomplete="off"></div>' +
        '<div id="modal-test-result" style="display:none"></div>';
      footEl.innerHTML =
        '<button type="button" class="btn btn-default" id="modal-test-btn" data-write-action>测试连接</button>' +
        '<button type="button" class="btn btn-primary" id="modal-save-btn" data-write-action disabled>保存</button>' +
        '<button type="button" class="btn btn-default" id="modal-cancel-btn">取消</button>';

      var ep = document.getElementById('modal-endpoint');
      var ak = document.getElementById('modal-apikey');
      if (ep) ep.oninput = onModalFieldChange;
      if (ak) ak.oninput = onModalFieldChange;
    }

    var testBtn = document.getElementById('modal-test-btn');
    var testRedisBtn = document.getElementById('modal-test-redis-btn');
    var saveBtn = document.getElementById('modal-save-btn');
    var cancelBtn = document.getElementById('modal-cancel-btn');
    var closeOnlyBtn = document.getElementById('modal-close-only-btn');

    if (testBtn) testBtn.onclick = function () { testServiceConnection(svcKey); };
    if (testRedisBtn) testRedisBtn.onclick = function () { testServiceConnection(svcKey); };
    if (saveBtn) saveBtn.onclick = function () { saveServiceConfig(svcKey); };
    if (cancelBtn) cancelBtn.onclick = closeConfigModal;
    if (closeOnlyBtn) closeOnlyBtn.onclick = closeConfigModal;

    modal.classList.add('show');
  }

  function closeConfigModal() {
    var modal = document.getElementById('config-modal');
    if (modal) modal.classList.remove('show');
    currentSvcKey = '';
  }

  async function testServiceConnection(svcKey) {
    var resultId = svcKey === 'content_safety' ? 'content-safety-test-result' : 'modal-test-result';
    var box = document.getElementById(resultId);
    if (!box) return;
    box.style.display = 'block';
    box.innerHTML = '<div class="alert alert-info">正在测试连接...</div>';

    var payload = {};
    if (svcKey !== 'content_safety') {
      var ep = document.getElementById('modal-endpoint');
      var ak = document.getElementById('modal-apikey');
      if (ep && ep.value.trim()) payload.endpoint = ep.value.trim();
      if (ak && ak.value.trim()) payload.api_key = ak.value.trim();
    }

    var res = await adminRequest(
      'POST',
      '/api/admin/third-party/' + svcKey + '/test-connection',
      payload,
      false,
      { silentErrorToast: true }
    );

    if (res && res.code === 0 && res.data && res.data.connected === true) {
      configTestPassed[svcKey] = true;
      var smb = document.getElementById('modal-save-btn');
      if (smb) smb.disabled = false;
      var ms = res.data.latency_ms != null ? res.data.latency_ms : '—';
      box.innerHTML = '<div class="alert alert-success">✅ 连接成功，延迟 ' + ms + 'ms</div>';
    } else {
      configTestPassed[svcKey] = false;
      var smb2 = document.getElementById('modal-save-btn');
      if (smb2) smb2.disabled = true;
      var err = (res && res.data && res.data.error) ? String(res.data.error) : (res && res.message) ? String(res.message) : '请求失败';
      box.innerHTML = '<div class="alert alert-error">❌ 连接失败：' + escapeHtml(err) + '</div>';
    }
  }

  async function saveServiceConfig(svcKey) {
    if (!configTestPassed[svcKey]) {
      showToast('请先测试连接并通过后再保存', 'warning');
      return;
    }
    var body = {};
    var ep = document.getElementById('modal-endpoint');
    var ak = document.getElementById('modal-apikey');
    if (ep && ep.value.trim()) body.endpoint = ep.value.trim();
    if (ak && ak.value.trim()) body.api_key = ak.value.trim();
    if (Object.keys(body).length === 0) {
      showToast('请填写至少一项配置', 'warning');
      return;
    }
    var res = await adminRequest('PUT', '/api/admin/third-party/' + svcKey + '/config', body);
    if (res && res.code === 0) {
      showToast('配置已保存', 'success');
      closeConfigModal();
    }
  }

  document.body.innerHTML =
    renderSidebar('third-party') +
    renderHeader('第三方服务监控') +
    '<div class="admin-content">' +
      '<div id="service-grid">' +
        '<div class="skeleton"></div>' +
        '<div class="skeleton"></div>' +
        '<div class="skeleton"></div>' +
        '<div class="skeleton"></div>' +
      '</div>' +
    '</div>' +
    '<div id="config-modal" class="modal-overlay">' +
      '<div class="modal-content" style="min-width:400px;max-width:520px">' +
        '<div class="modal-header">' +
          '<h3 id="config-modal-title">配置</h3>' +
          '<button type="button" class="btn btn-link" id="config-modal-x">✕</button>' +
        '</div>' +
        '<div class="modal-body" id="config-modal-body"></div>' +
        '<div class="modal-footer" id="config-modal-footer"></div>' +
      '</div>' +
    '</div>';

  document.getElementById('service-grid').addEventListener('click', function (e) {
    var btn = e.target.closest('.tp-config-btn');
    if (!btn) return;
    var dn = btn.getAttribute('data-display-name') || '';
    var sk = btn.getAttribute('data-svc-key') || '';
    openConfigModal(dn, sk);
  });

  document.getElementById('config-modal').addEventListener('click', function (e) {
    if (e.target.id === 'config-modal') closeConfigModal();
  });
  document.getElementById('config-modal-x').onclick = closeConfigModal;

  refreshThirdPartyStatus();
  refreshTimer = setInterval(refreshThirdPartyStatus, 60000);

  window.addEventListener('beforeunload', function () {
    if (refreshTimer) clearInterval(refreshTimer);
  });
})();
</script>

</body>
</html>
