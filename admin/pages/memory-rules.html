<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记忆规则配置 - 林小梦管理后台</title>
  <link rel="stylesheet" href="/admin/static/css/admin-common.css">
  <style>
    .memory-api-key-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .memory-api-key-row .form-control {
      flex: 1;
      min-width: 200px;
      max-width: 480px;
      box-sizing: border-box;
    }
    #memory-page-wrap.is-loading .memory-disable-while-load {
      opacity: 0.6;
      pointer-events: none;
    }
    .memory-tab-header-card {
      padding-bottom: 0;
      margin-bottom: 16px;
    }
    .memory-tab-header-card .tabs {
      margin-bottom: 0;
    }
    .btn-block {
      width: 100%;
      justify-content: center;
      box-sizing: border-box;
    }
    .memory-vector-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .memory-vector-actions .btn {
      flex: 1;
      min-width: 140px;
      justify-content: center;
    }
    .memory-input-w100 {
      width: 100px;
      box-sizing: border-box;
    }
    /* ─── Step6 Prompt 分区 ─── */
    .step6-block-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    .step6-prompt-textarea {
      font-family: monospace, Consolas, Menlo, monospace;
      font-size: 13px;
    }
    .step6-task-field {
      margin-bottom: 12px;
    }
    .step6-task-field label {
      font-family: monospace, Consolas, Menlo, monospace;
      font-size: 12px;
      color: #1890ff;
    }
    /* ─── 全局用户记忆 ─── */
    .global-filter {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .global-filter input[type="text"],
    .global-filter input[type="number"] {
      height: 32px;
      padding: 0 10px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
    }
    .global-filter input[type="number"] { width: 140px; }
    .global-filter input[type="text"] { width: 240px; }
    .global-tip {
      margin-bottom: 12px;
      padding: 8px 12px;
      font-size: 12px;
      line-height: 1.6;
      color: #876800;
      background: rgba(250, 173, 20, 0.1);
      border: 1px solid rgba(250, 173, 20, 0.3);
      border-radius: 4px;
    }
    .global-pager {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }
    .global-empty {
      text-align: center;
      padding: 40px 0;
      color: var(--text-disabled);
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="sidebar-mount"></div>
<div class="admin-content">
  <div id="header-mount"></div>

  <div id="memory-page-wrap" class="is-loading">
    <div class="page-card memory-tab-header-card">
      <div class="tabs" id="memory-tabs">
        <div class="tab-item active" data-target="pane-step6-prompt">Step6 记忆 Prompt（默认）</div>
        <div class="tab-item" data-target="pane-vector-db">向量数据库配置</div>
        <div class="tab-item" data-target="pane-global-memory">全局用户记忆</div>
      </div>
    </div>

    <!-- Tab 1：Step6 记忆 Prompt（保存即发布） -->
    <div id="pane-step6-prompt" class="tab-pane active">
      <div class="page-card memory-disable-while-load">
        <div class="form-item">
          <div class="step6-block-title">系统指令 system_instruction</div>
          <textarea id="s6-system_instruction" class="form-control step6-prompt-textarea" rows="3"></textarea>
        </div>
        <div class="form-item mt-16">
          <div class="step6-block-title">输出格式要求 output_format_rules</div>
          <textarea id="s6-output_format_rules" class="form-control step6-prompt-textarea" rows="5"></textarea>
        </div>
        <div class="form-item mt-16">
          <div class="step6-block-title">KV 字段规则 kv_field_rules</div>
          <textarea id="s6-kv_field_rules" class="form-control step6-prompt-textarea" rows="6"></textarea>
        </div>
        <div class="form-item mt-16">
          <div class="step6-block-title">任务字段 task_fields（11 项，顺序固定）</div>
          <div id="s6-task-fields"></div>
        </div>
        <div class="form-item mt-16">
          <div class="step6-block-title">合并规则 merge_rules</div>
          <textarea id="s6-merge_rules" class="form-control step6-prompt-textarea" rows="4"></textarea>
        </div>
        <div class="form-item mt-16">
          <div class="step6-block-title">少样本示例 few_shot_example</div>
          <textarea id="s6-few_shot_example" class="form-control step6-prompt-textarea" rows="6"></textarea>
        </div>
        <div class="mt-24">
          <button type="button" class="btn btn-primary btn-block" id="btn-save-step6-prompt">保存并发布</button>
        </div>
      </div>
    </div>

    <!-- Tab 2：向量数据库（保留） -->
    <div id="pane-vector-db" class="tab-pane">
      <div class="page-card memory-disable-while-load">
        <div class="form-item">
          <label>Endpoint</label>
          <input type="url" id="vector-endpoint" class="form-control" placeholder="https://..." autocomplete="off">
        </div>
        <div class="form-item mt-16">
          <label>Collection 名称</label>
          <input type="text" id="vector-collection" class="form-control" placeholder="集合名称" autocomplete="off">
        </div>
        <div class="form-item mt-16">
          <label>检索 TopK</label>
          <input type="number" id="vector-top-k" class="form-control memory-input-w100" min="1" step="1" title="保存与测连须在 1–20 范围内">
          <p class="text-secondary mt-8" style="font-size:13px;margin-bottom:0">测连与保存时须在 1–20；若配置中曾大于 20，请改回范围内再保存，避免误覆盖</p>
        </div>
        <div class="form-item mt-16">
          <label>API Key</label>
          <div class="memory-api-key-row">
            <input type="password" id="vector-api-key-masked" class="form-control" readonly autocomplete="off" placeholder="加载后显示脱敏值">
            <button type="button" class="btn btn-default" id="btn-toggle-api-key">修改</button>
          </div>
          <div id="vector-api-key-plain-wrap" class="mt-8" style="display:none">
            <input type="password" id="vector-api-key-plain" class="form-control" style="max-width:480px;box-sizing:border-box;font-family:monospace" placeholder="输入新 API Key" autocomplete="off">
          </div>
        </div>

        <div id="vector-test-result" class="memory-vdb-test-result" style="display:none;margin-top:16px"></div>

        <div class="memory-vector-actions">
          <button type="button" class="btn btn-default" id="btn-vector-test">测试连接</button>
          <button type="button" class="btn btn-primary" id="btn-vector-save" disabled title="请先测试连接">保存</button>
        </div>
      </div>
    </div>

    <!-- Tab 3：全局用户记忆 -->
    <div id="pane-global-memory" class="tab-pane">
      <div class="page-card">
        <div class="global-filter">
          <input type="number" id="global-user-id" min="1" step="1" placeholder="用户 ID（选填）">
          <input type="text" id="global-keyword" placeholder="关键词（选填）">
          <button type="button" class="btn btn-primary" id="btn-global-search">搜索</button>
          <button type="button" class="btn btn-danger" id="btn-global-batch-delete">批量删除选中</button>
        </div>
        <div class="global-tip">未指定用户时仅在最多 300 条用户记忆中检索，结果可能不完整，建议填写用户 ID</div>
        <div id="global-truncated" class="alert alert-warning" style="display:none;margin-bottom:12px"></div>
        <div style="overflow-x:auto">
          <table class="admin-table" id="global-table" style="display:none">
            <thead>
              <tr>
                <th style="width:44px"><input type="checkbox" id="global-check-all"></th>
                <th style="width:90px">用户ID</th>
                <th style="min-width:160px">Key</th>
                <th style="min-width:200px">Value</th>
                <th style="width:90px">操作</th>
              </tr>
            </thead>
            <tbody id="global-tbody"></tbody>
          </table>
        </div>
        <div class="global-empty" id="global-empty" style="display:none">暂无数据，请输入条件后搜索</div>
        <div class="global-pager" id="global-pager" style="display:none">
          <button type="button" class="btn btn-default" id="btn-global-prev">上一页</button>
          <span id="global-page-info" style="font-size:13px;color:var(--text-secondary)"></span>
          <button type="button" class="btn btn-default" id="btn-global-next">下一页</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/admin/static/js/admin-api.js"></script>
<script>
(function () {
  var ALLOWED_ROLES = ['super_admin', 'ai_trainer'];

  /* HTML 转义（防止 key/value 中的特殊字符破坏结构） */
  function esc(str) {
    var div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  /* task_fields 11 项，顺序与后端 _ALL_FIELD_NAMES 一致（P6） */
  var TASK_FIELD_NAMES = [
    'InnerMonologue',
    'CharacterPublicSettings',
    'CharacterPrivateSettings',
    'CharacterKnowledges',
    'UserSettings',
    'UserRealName',
    'UserHobbyName',
    'UserDescription',
    'CharacterPurpose',
    'CharacterAttitude',
    'RelationDescription'
  ];
  var STEP6_TEXT_BLOCKS = [
    'system_instruction',
    'output_format_rules',
    'kv_field_rules',
    'merge_rules',
    'few_shot_example'
  ];

  var vectorTestPassed = false;
  var vectorKeyPlainVisible = false;

  /* 全局用户记忆分页状态 */
  var globalPage = 1;
  var globalPageSize = 20;
  var globalTotal = 0;
  var globalLastQuery = null;

  /* ─────────── Step6 记忆 Prompt ─────────── */
  function renderTaskFieldInputs() {
    var box = document.getElementById('s6-task-fields');
    box.innerHTML = '';
    TASK_FIELD_NAMES.forEach(function (name) {
      var wrap = document.createElement('div');
      wrap.className = 'step6-task-field';
      wrap.innerHTML =
        '<label>' + name + '</label>' +
        '<textarea id="tf-' + name + '" class="form-control step6-prompt-textarea" rows="2"></textarea>';
      box.appendChild(wrap);
    });
  }

  function fillStep6Form(cfg) {
    cfg = cfg || {};
    STEP6_TEXT_BLOCKS.forEach(function (key) {
      var el = document.getElementById('s6-' + key);
      if (el) el.value = cfg[key] != null ? String(cfg[key]) : '';
    });
    var tf = cfg.task_fields || {};
    TASK_FIELD_NAMES.forEach(function (name) {
      var el = document.getElementById('tf-' + name);
      if (el) el.value = tf[name] != null ? String(tf[name]) : '';
    });
  }

  function collectStep6Form() {
    var body = {};
    var i;
    for (i = 0; i < STEP6_TEXT_BLOCKS.length; i++) {
      var key = STEP6_TEXT_BLOCKS[i];
      var v = (document.getElementById('s6-' + key).value || '').trim();
      if (!v) {
        showToast('「' + key + '」不能为空', 'warning');
        return null;
      }
      body[key] = document.getElementById('s6-' + key).value;
    }
    var taskFields = {};
    for (i = 0; i < TASK_FIELD_NAMES.length; i++) {
      var name = TASK_FIELD_NAMES[i];
      var tv = (document.getElementById('tf-' + name).value || '').trim();
      if (!tv) {
        showToast('任务字段「' + name + '」不能为空', 'warning');
        return null;
      }
      taskFields[name] = document.getElementById('tf-' + name).value;
    }
    body.task_fields = taskFields;
    return body;
  }

  async function loadStep6Prompt() {
    var res = await adminRequest('GET', '/api/admin/step6-memory-prompt');
    var cfg = (res && res.code === 0) ? res.data : null;
    fillStep6Form(cfg);
  }

  /* ─────────── 向量数据库（保留） ─────────── */
  function parseVectorTopKInput() {
    var tk = parseInt(document.getElementById('vector-top-k').value, 10);
    if (isNaN(tk) || tk < 1) return null;
    return tk;
  }

  function isVectorTopKInProductRange(tk) {
    return tk != null && tk >= 1 && tk <= 20;
  }

  function setVectorSaveEnabled(on) {
    var btn = document.getElementById('btn-vector-save');
    if (!btn) return;
    if (on) {
      btn.disabled = false;
      btn.removeAttribute('title');
    } else {
      btn.disabled = true;
      btn.setAttribute('title', '请先测试连接');
    }
  }

  function setVectorTestPassed(passed) {
    vectorTestPassed = passed;
    setVectorSaveEnabled(passed);
  }

  function resetVectorTestResult() {
    var el = document.getElementById('vector-test-result');
    if (!el) return;
    el.innerHTML = '';
    el.style.display = 'none';
  }

  function showVectorTestResult(htmlClass, text) {
    var el = document.getElementById('vector-test-result');
    if (!el) return;
    el.style.display = 'block';
    el.innerHTML = '';
    var div = document.createElement('div');
    div.className = 'alert ' + htmlClass;
    div.style.marginBottom = '0';
    div.textContent = text;
    el.appendChild(div);
  }

  function openApiKeyPlainEditor() {
    vectorKeyPlainVisible = true;
    var wrap = document.getElementById('vector-api-key-plain-wrap');
    var plain = document.getElementById('vector-api-key-plain');
    var btn = document.getElementById('btn-toggle-api-key');
    if (!wrap || !plain || !btn) return;
    wrap.style.display = 'block';
    btn.textContent = '取消';
    plain.value = '';
    plain.focus();
    setVectorTestPassed(false);
    resetVectorTestResult();
  }

  function closeApiKeyPlainEditor() {
    vectorKeyPlainVisible = false;
    var wrap = document.getElementById('vector-api-key-plain-wrap');
    var plain = document.getElementById('vector-api-key-plain');
    var btn = document.getElementById('btn-toggle-api-key');
    if (wrap) wrap.style.display = 'none';
    if (plain) plain.value = '';
    if (btn) btn.textContent = '修改';
  }

  async function loadVectorConfig() {
    var res = await adminRequest('GET', '/api/admin/vector-db-config');
    if (!res || res.code !== 0 || !res.data) return;
    var d = res.data;
    document.getElementById('vector-endpoint').value = d.endpoint != null ? String(d.endpoint) : '';
    document.getElementById('vector-collection').value = d.collection_name != null ? String(d.collection_name) : '';
    var tk = parseInt(d.top_k, 10);
    document.getElementById('vector-top-k').value = (!isNaN(tk) && tk >= 1) ? tk : 5;
    var masked = d.api_key_masked != null ? String(d.api_key_masked) : '';
    document.getElementById('vector-api-key-masked').value = masked;
  }

  /* ─────────── 全局用户记忆 ─────────── */
  function getSelectedDocIds() {
    var ids = [];
    document.querySelectorAll('#global-tbody input.global-row-check:checked').forEach(function (cb) {
      ids.push(cb.getAttribute('data-doc-id'));
    });
    return ids;
  }

  function renderGlobalTable(list) {
    var tbody = document.getElementById('global-tbody');
    var table = document.getElementById('global-table');
    var empty = document.getElementById('global-empty');
    var pager = document.getElementById('global-pager');
    tbody.innerHTML = '';
    document.getElementById('global-check-all').checked = false;

    if (!list || !list.length) {
      table.style.display = 'none';
      pager.style.display = 'none';
      empty.style.display = 'block';
      empty.textContent = globalLastQuery ? '未检索到符合条件的用户记忆' : '暂无数据，请输入条件后搜索';
      return;
    }

    empty.style.display = 'none';
    table.style.display = '';
    var html = '';
    for (var i = 0; i < list.length; i++) {
      var item = list[i];
      var docId = item.doc_id != null ? String(item.doc_id) : '';
      html += '<tr>';
      html += '  <td><input type="checkbox" class="global-row-check" data-doc-id="' + esc(docId) + '"></td>';
      html += '  <td>' + esc(item.user_id != null ? String(item.user_id) : '-') + '</td>';
      html += '  <td>' + esc(item.key || '') + '</td>';
      html += '  <td>' + esc(item.value || '') + '</td>';
      html += '  <td><button class="btn btn-danger" style="padding:2px 10px;height:26px;font-size:12px" ' +
              'onclick="globalDeleteOne(this)" data-doc-id="' + esc(docId) + '">删除</button></td>';
      html += '</tr>';
    }
    tbody.innerHTML = html;

    var totalPages = Math.max(1, Math.ceil(globalTotal / globalPageSize));
    document.getElementById('global-page-info').textContent =
      '第 ' + globalPage + ' / ' + totalPages + ' 页，共 ' + globalTotal + ' 条';
    document.getElementById('btn-global-prev').disabled = globalPage <= 1;
    document.getElementById('btn-global-next').disabled = globalPage >= totalPages;
    pager.style.display = 'flex';
  }

  async function loadGlobalMemories() {
    var userIdRaw = (document.getElementById('global-user-id').value || '').trim();
    var keyword = (document.getElementById('global-keyword').value || '').trim();
    globalLastQuery = { userId: userIdRaw, keyword: keyword };

    var query = '?page=' + globalPage + '&page_size=' + globalPageSize +
                '&keyword=' + encodeURIComponent(keyword);
    if (userIdRaw) query += '&user_id=' + encodeURIComponent(userIdRaw);

    var res = await adminRequest('GET', '/api/admin/memories/global' + query);
    if (!res || res.code !== 0 || !res.data) {
      renderGlobalTable([]);
      return;
    }
    var d = res.data;
    globalTotal = typeof d.total === 'number' ? d.total : (d.list || []).length;

    var warn = document.getElementById('global-truncated');
    if (d.truncated) {
      warn.style.display = 'block';
      warn.textContent = '⚠️ 未指定用户，结果仅取自最多 300 条用户记忆，可能不完整，建议填写用户 ID 精确检索';
    } else {
      warn.style.display = 'none';
    }

    renderGlobalTable(d.list || []);
  }

  function doGlobalDelete(docIds) {
    if (!docIds.length) {
      showToast('请先勾选要删除的记录', 'warning');
      return;
    }
    showConfirm('确定删除选中的 ' + docIds.length + ' 条用户记忆吗？删除后不可恢复。', async function () {
      var res = await adminRequest('DELETE', '/api/admin/memories/batch-delete', { doc_ids: docIds });
      if (res && res.code === 0) {
        var data = res.data || {};
        var failed = (data.failed_doc_ids || []).length;
        var msg = '已删除 ' + (data.deleted_count || 0) + ' 条';
        if (failed) msg += '，' + failed + ' 条失败';
        showToast(msg, failed ? 'warning' : 'success');
        loadGlobalMemories();
      }
    }, null, { danger: true });
  }

  /* 单条删除（复用 batch-delete） */
  window.globalDeleteOne = function (btn) {
    var docId = btn.getAttribute('data-doc-id');
    if (docId) doGlobalDelete([docId]);
  };

  /* ─────────── 初始化 ─────────── */
  async function loadAll() {
    var wrap = document.getElementById('memory-page-wrap');
    if (wrap) wrap.classList.add('is-loading');
    await Promise.all([loadStep6Prompt(), loadVectorConfig()]);
    if (wrap) wrap.classList.remove('is-loading');
  }

  document.addEventListener('DOMContentLoaded', function () {
    if (!checkAdminLogin()) return;
    if (ALLOWED_ROLES.indexOf(getAdminRole()) < 0) {
      window.location.href = '/admin/pages/error.html?type=403';
      return;
    }

    document.getElementById('sidebar-mount').innerHTML = renderSidebar('memory');
    document.getElementById('header-mount').innerHTML = renderHeader('记忆规则配置');

    initTabs('memory-tabs');
    renderTaskFieldInputs();

    /* Step6 Prompt 保存即发布 */
    document.getElementById('btn-save-step6-prompt').onclick = async function () {
      var body = collectStep6Form();
      if (!body) return;
      var btn = this;
      btn.disabled = true;
      var res = await adminRequest('PUT', '/api/admin/step6-memory-prompt', body);
      btn.disabled = false;
      if (res && res.code === 0) {
        showToast('Step6 记忆 Prompt 已保存并发布', 'success');
      }
    };

    /* 向量数据库 */
    document.getElementById('btn-toggle-api-key').onclick = function () {
      if (vectorKeyPlainVisible) closeApiKeyPlainEditor();
      else openApiKeyPlainEditor();
    };

    document.getElementById('vector-api-key-plain').addEventListener('input', function () {
      setVectorTestPassed(false);
      resetVectorTestResult();
    });

    document.getElementById('btn-vector-test').onclick = async function () {
      var topK = parseVectorTopKInput();
      if (!isVectorTopKInProductRange(topK)) {
        showToast('检索 TopK 须为 1–20 的整数后再测试连接', 'warning');
        return;
      }
      var endpoint = (document.getElementById('vector-endpoint').value || '').trim();
      var collection = (document.getElementById('vector-collection').value || '').trim();
      var plainKey = (document.getElementById('vector-api-key-plain').value || '').trim();
      var body = {
        endpoint: endpoint || null,
        collection_name: collection || null
      };
      if (plainKey) body.api_key = plainKey;

      showVectorTestResult('alert-info', '正在测试连接...');
      var res = await adminRequest(
        'POST',
        '/api/admin/vector-db-config/test-connection',
        body,
        false,
        { silentErrorToast: true }
      );
      if (!res || res.code !== 0) {
        var msg0 = (res && res.message) ? String(res.message) : '请求失败';
        showVectorTestResult('alert-error', '❌ 连接失败：' + msg0);
        setVectorTestPassed(false);
        return;
      }
      var data = res.data || {};
      if (data.connected) {
        var ms = data.latency_ms != null ? data.latency_ms : 0;
        showVectorTestResult('alert-success', '✅ 连接成功，延迟 ' + ms + 'ms');
        setVectorTestPassed(true);
      } else {
        var err = data.error != null ? String(data.error) : ((res.message != null) ? String(res.message) : '未知错误');
        showVectorTestResult('alert-error', '❌ 连接失败：' + err);
        setVectorTestPassed(false);
      }
    };

    document.getElementById('btn-vector-save').onclick = async function () {
      if (!vectorTestPassed) {
        showToast('请先测试连接', 'warning');
        return;
      }
      var endpoint = (document.getElementById('vector-endpoint').value || '').trim();
      var collection = (document.getElementById('vector-collection').value || '').trim();
      var topK = parseVectorTopKInput();
      if (!endpoint) {
        showToast('请填写 Endpoint', 'warning');
        return;
      }
      if (!collection) {
        showToast('请填写 Collection 名称', 'warning');
        return;
      }
      if (!isVectorTopKInProductRange(topK)) {
        showToast('检索 TopK 须为 1–20 的整数后再保存', 'warning');
        return;
      }
      var plainKey = (document.getElementById('vector-api-key-plain').value || '').trim();
      var body = {
        endpoint: endpoint,
        collection_name: collection,
        top_k: topK,
        need_test_first: false
      };
      if (plainKey) body.api_key = plainKey;

      var res = await adminRequest('PUT', '/api/admin/vector-db-config', body);
      if (res && res.code === 0) {
        showToast('保存成功', 'success');
        closeApiKeyPlainEditor();
        setVectorTestPassed(false);
        resetVectorTestResult();
        await loadVectorConfig();
      }
    };

    /* 全局用户记忆 */
    document.getElementById('btn-global-search').onclick = function () {
      globalPage = 1;
      loadGlobalMemories();
    };
    document.getElementById('btn-global-batch-delete').onclick = function () {
      doGlobalDelete(getSelectedDocIds());
    };
    document.getElementById('btn-global-prev').onclick = function () {
      if (globalPage > 1) { globalPage--; loadGlobalMemories(); }
    };
    document.getElementById('btn-global-next').onclick = function () {
      globalPage++;
      loadGlobalMemories();
    };
    document.getElementById('global-check-all').onclick = function () {
      var checked = this.checked;
      document.querySelectorAll('#global-tbody input.global-row-check').forEach(function (cb) {
        cb.checked = checked;
      });
    };

    loadAll();
  });
})();
</script>
</body>
</html>
