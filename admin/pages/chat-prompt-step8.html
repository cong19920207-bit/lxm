<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Step8 Future 主动 - 对话流 Prompt</title>
  <link rel="stylesheet" href="/admin/static/css/admin-common.css?v=observer-v1-20260716">
  <style>
    .hint-ro { font-size: 13px; color: #876800; background: #fffbe6; border: 1px solid #ffe58f; border-radius: 4px; padding: 10px 12px; margin-bottom: 16px; line-height: 1.6; }
    .prompt-pre { white-space: pre-wrap; word-break: break-word; font-family: monospace, Consolas, Menlo, monospace; font-size: 12px; line-height: 1.5; max-height: 70vh; overflow: auto; margin: 0; background: #fafafa; border: 1px solid #f0f0f0; border-radius: 4px; padding: 12px; }
    .src-meta { font-size: 12px; color: #888; margin: 8px 0 16px; }
    .note-list { font-size: 13px; color: #555; line-height: 1.7; margin: 12px 0 0; padding-left: 18px; }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>
<div class="admin-content">
  <div id="header-mount"></div>
  <div class="page-card">
    <div class="hint-ro">只读展示 · Future 槽到期触发 · 与 Agent P0～P4（规则触发）是不同链路。</div>
    <p class="src-meta" id="src-meta">加载中…</p>
    <h3 style="font-size:14px;margin:0 0 8px">模块9 · 【主动发起】模板</h3>
    <pre class="prompt-pre" id="pre-tpl">加载中…</pre>
    <ul class="note-list" id="note-list"></ul>
  </div>
</div>
<script src="/admin/static/js/admin-api.js?v=observer-v1-20260716"></script>
<script>
(function () {
  var ROLES = ['super_admin', 'ai_trainer', 'observer'];
  document.addEventListener('DOMContentLoaded', async function () {
    if (!checkAdminLogin()) return;
    if (ROLES.indexOf(getAdminRole()) < 0) {
      window.location.href = '/admin/pages/error.html?type=403';
      return;
    }
    document.getElementById('sidebar-mount').innerHTML = renderSidebar('cp-step8');
    document.getElementById('header-mount').innerHTML = renderHeader('Step8 Future 主动');
    var r = await adminRequest('GET', '/api/admin/chat-prompt-view/step8');
    if (!r || r.code !== 0) {
      document.getElementById('pre-tpl').textContent = '加载失败';
      return;
    }
    var d = r.data || {};
    document.getElementById('src-meta').textContent =
      (d.description || '') + ' · 源文件：' + (d.source_file || '');
    document.getElementById('pre-tpl').textContent = d.proactive_input_template || '';
    var notes = d.notes || [];
    var ul = document.getElementById('note-list');
    ul.innerHTML = notes.map(function (n) { return '<li>' + n + '</li>'; }).join('');
  });
})();
</script>
</body>
</html>
