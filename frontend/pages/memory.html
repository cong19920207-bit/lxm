<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>林小梦 - 记忆</title>
  <link rel="stylesheet" href="/static/css/common.css">
  <link rel="stylesheet" href="/static/css/h5-theme.css">
  <style>
    .page-body {
      padding: 56px 16px calc(16px + var(--safe-area-bottom));
    }

    /* 顶部只读说明（对话自动整理，暂不支持手动修改） */
    .memory-tip {
      font-size: 12px;
      line-height: 1.6;
      color: var(--color-gray);
      background: rgba(232, 147, 138, 0.08);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }

    /* 记忆卡片（只读 KV） */
    .memory-card {
      margin-bottom: 12px;
    }

    .memory-key {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text);
      word-break: break-word;
      margin-bottom: 6px;
    }

    .memory-value {
      font-size: 14px;
      line-height: 1.8;
      color: var(--color-text);
      word-break: break-word;
    }
  </style>
</head>
<body class="h5-skin">
  <!-- 顶部栏 -->
  <div class="top-bar">
    <div class="bar-left">
      <button class="back-btn" onclick="history.back()">←</button>
    </div>
    <div class="bar-center">林小梦记住的你</div>
    <div class="bar-right"></div>
  </div>

  <div class="page-body">
    <!-- 只读说明：内容由对话自动整理，暂不支持手动修改 -->
    <div class="memory-tip">以下内容由对话自动整理，暂不支持手动修改</div>

    <div id="memory-list"></div>
    <div class="load-more-sentinel" id="bottom-sentinel"></div>
    <div class="no-more-text" id="no-more" style="display:none">没有更多记忆了</div>

    <!-- 空状态 -->
    <div class="empty-state" id="empty-state" style="display:none">
      <div class="empty-icon">
        <div class="empty-bubble"></div>
        <div class="empty-dot"></div>
        <div class="empty-dot"></div>
        <div class="empty-dot"></div>
      </div>
      <div class="empty-text">林小梦还在对话中了解你，暂无整理好的记忆</div>
      <button class="btn-primary" onclick="location.href='/pages/chat.html'">去聊天</button>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    checkLogin()

    let currentPage = 1
    let loading = false
    let noMore = false
    let totalLoaded = 0

    /* ====== 加载记忆列表（只读 KV） ====== */
    async function loadMemories(page) {
      if (loading || noMore) return
      loading = true

      const res = await request('GET', '/api/memory/list?page=' + page)
      if (res.code === 0 && res.data) {
        const d = res.data
        // 后端只读结构：{ total, page, page_size, list:[{doc_id, key, value, content}] }
        const memories = Array.isArray(d.list) ? d.list : []
        const pageSize = typeof d.page_size === 'number' ? d.page_size : 20
        const total = typeof d.total === 'number' ? d.total : memories.length

        if (memories.length === 0 && page === 1) {
          document.getElementById('empty-state').style.display = 'flex'
          loading = false
          return
        }

        // 本页条数不足一页，或累计已覆盖服务端总数，则没有更多
        const loadedAfter = totalLoaded + memories.length
        if (memories.length < pageSize || loadedAfter >= total) {
          noMore = true
          if (loadedAfter > 0) {
            document.getElementById('no-more').style.display = 'block'
          }
        }

        memories.forEach(m => appendMemoryCard(m))
        totalLoaded += memories.length
        currentPage = page
      }

      loading = false
    }

    function appendMemoryCard(memory) {
      const list = document.getElementById('memory-list')
      const card = document.createElement('div')
      card.className = 'card memory-card'
      // 优先展示 key/value；缺 key 时退化为整行 content
      const key = (memory.key || '').trim()
      const value = (memory.value || memory.content || '').trim()
      if (key) {
        card.innerHTML = `
          <div class="memory-key">${escapeHtml(key)}</div>
          <div class="memory-value">${escapeHtml(value)}</div>
        `
      } else {
        card.innerHTML = `<div class="memory-value">${escapeHtml(value)}</div>`
      }
      list.appendChild(card)
    }

    function escapeHtml(text) {
      const div = document.createElement('div')
      div.textContent = text == null ? '' : text
      return div.innerHTML
    }

    /* ====== 触底加载 ====== */
    const observer = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting && !loading && !noMore) {
        loadMemories(currentPage + 1)
      }
    })
    observer.observe(document.getElementById('bottom-sentinel'))

    /* ====== 初始化 ====== */
    loadMemories(1)
  </script>
</body>
</html>
