<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>林小梦 - 设置</title>
  <link rel="stylesheet" href="/static/css/common.css">
  <link rel="stylesheet" href="/static/css/h5-theme.css">
  <style>
    /* ====== 设置页局部软 UI（覆盖 neo 黑边，不影响其他页面） ====== */
    body.settings-soft-page.h5-skin {
      background: linear-gradient(180deg, #f5f3ff 0%, #fafafa 48%, #f8f7fc 100%);
      background-attachment: fixed;
    }

    html:has(> body.settings-soft-page.h5-skin) {
      background: linear-gradient(180deg, #f5f3ff 0%, #fafafa 48%, #f8f7fc 100%);
      background-attachment: fixed;
    }

    body.settings-soft-page.h5-skin .top-bar {
      background: rgba(255, 255, 255, 0.92);
      border-bottom: none;
      box-shadow: 0 1px 0 rgba(124, 58, 237, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    body.settings-soft-page.h5-skin .top-bar .back-btn {
      font-size: 20px;
      color: #374151;
    }

    body.settings-soft-page.h5-skin .top-bar .bar-center {
      font-weight: 600;
      color: #1f2937;
    }

    .settings-page-body {
      padding: 56px 16px calc(24px + var(--safe-area-bottom));
    }

    .settings-section-label {
      font-size: 13px;
      font-weight: 500;
      color: #9ca3af;
      margin: 0 4px 10px;
    }

    .settings-section-label:not(:first-child) {
      margin-top: 20px;
    }

    .settings-soft-card {
      background: #fff;
      border-radius: 20px;
      padding: 4px 16px;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.07);
      border: 1px solid rgba(124, 58, 237, 0.06);
    }

    /* ====== Profile 卡 ====== */
    .profile-card {
      position: relative;
      border-radius: 24px;
      padding: 18px 16px 16px;
      margin-bottom: 20px;
      overflow: hidden;
      background: linear-gradient(135deg, #faf5ff 0%, #f3e8ff 42%, #ede9fe 100%);
      box-shadow: 0 8px 28px rgba(124, 58, 237, 0.10);
      border: none;
    }

    .profile-card::before,
    .profile-card::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .profile-card::before {
      width: 120px;
      height: 120px;
      top: -40px;
      right: -30px;
      background: radial-gradient(circle, rgba(196, 181, 253, 0.32) 0%, transparent 70%);
    }

    .profile-card::after {
      width: 6px;
      height: 6px;
      top: 24px;
      right: 80px;
      background: rgba(167, 139, 250, 0.38);
      box-shadow:
        24px 12px 0 rgba(196, 181, 253, 0.22),
        48px -8px 0 rgba(167, 139, 250, 0.16);
    }

    .profile-inner {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .profile-avatar-wrap {
      flex-shrink: 0;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, #a78bfa, #7c3aed, #c084fc);
      box-shadow: 0 4px 16px rgba(124, 58, 237, 0.35);
    }

    .profile-avatar-wrap img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: #fff;
    }

    .profile-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding-top: 2px;
    }

    .profile-name-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .profile-name-block {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .profile-name {
      font-size: 18px;
      font-weight: 700;
      color: #1f2937;
      line-height: 1.2;
    }

    .profile-verified {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .profile-verified svg {
      display: block;
    }

    .profile-online {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.55);
      font-size: 12px;
      font-weight: 500;
      color: #22c55e;
    }

    .profile-online-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
    }

    .profile-bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 22px;
    }

    .profile-status-text {
      flex: 1;
      min-width: 0;
      font-size: 13px;
      font-weight: 400;
      color: #78716c;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 声波动画 */
    .profile-wave {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 3px;
      height: 22px;
    }

    .profile-wave span {
      display: block;
      width: 3px;
      border-radius: 2px;
      background: linear-gradient(180deg, #a78bfa, #7c3aed);
      animation: settings-wave 1.1s ease-in-out infinite;
    }

    .profile-wave span:nth-child(1) { height: 8px; animation-delay: 0s; }
    .profile-wave span:nth-child(2) { height: 14px; animation-delay: 0.15s; }
    .profile-wave span:nth-child(3) { height: 10px; animation-delay: 0.3s; }
    .profile-wave span:nth-child(4) { height: 16px; animation-delay: 0.45s; }

    @keyframes settings-wave {
      0%, 100% { transform: scaleY(0.55); opacity: 0.65; }
      50% { transform: scaleY(1); opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .profile-wave span {
        animation: none;
        opacity: 0.8;
      }
    }

    /* ====== 列表行 ====== */
    .settings-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      min-height: 56px;
    }

    .settings-item + .settings-item,
    .settings-item + .settings-expand-wrap,
    .settings-expand-wrap + .settings-item {
      border-top: 1px solid #f3f4f6;
    }

    .settings-item-icon {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, #f3e8ff, #ede9fe);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .settings-item-body {
      flex: 1;
      min-width: 0;
    }

    .settings-item-title {
      font-size: 15px;
      font-weight: 600;
      color: #1f2937;
      line-height: 1.3;
    }

    .settings-item-desc {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 3px;
      line-height: 1.45;
    }

    .settings-item-action {
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .settings-chevron {
      font-size: 18px;
      color: #d1d5db;
      transition: transform 0.25s ease;
      line-height: 1;
    }

    .settings-item.expanded .settings-chevron {
      transform: rotate(90deg);
    }

    .settings-item.clickable {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .settings-item.clickable:active {
      opacity: 0.85;
    }

    /* 紫色 Toggle（仅本页） */
    body.settings-soft-page .toggle-switch.active {
      background: #9333ea;
    }

    /* ====== 修改密码展开区 ====== */
    .settings-expand-wrap {
      display: none;
      padding: 0 0 16px 52px;
    }

    .settings-expand-wrap.visible {
      display: block;
    }

    .pwd-field-group {
      margin-bottom: 12px;
    }

    .pwd-field-group label {
      display: block;
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    .pwd-input-wrap {
      position: relative;
    }

    .pwd-input-wrap input {
      width: 100%;
      height: 46px;
      padding: 0 44px 0 14px;
      border: none;
      border-radius: 12px;
      background: #f3f4f6;
      font-size: 14px;
      color: #1f2937;
      box-shadow: none;
    }

    .pwd-input-wrap input::placeholder {
      color: #c4c4c4;
    }

    .pwd-input-wrap input:focus {
      background: #eef2ff;
      outline: 2px solid rgba(124, 58, 237, 0.25);
    }

    .pwd-eye-btn {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: #9ca3af;
      cursor: pointer;
      padding: 0;
    }

    .pwd-eye-btn:active {
      color: #7c3aed;
    }

    .save-pwd-btn {
      width: 100%;
      height: 46px;
      margin-top: 4px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(90deg, #3b82f6 0%, #9333ea 100%);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      box-shadow: 0 4px 14px rgba(124, 58, 237, 0.35);
      cursor: pointer;
    }

    .save-pwd-btn:active {
      transform: scale(0.98);
      opacity: 0.92;
    }

    /* ====== 关于展开 ====== */
    .about-expand-wrap {
      display: none;
      padding: 0 0 16px 52px;
    }

    .about-expand-wrap.visible {
      display: block;
    }

    .about-text {
      font-size: 14px;
      line-height: 1.85;
      color: #6b7280;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .about-text.loading {
      color: #9ca3af;
      font-style: italic;
    }

    /* ====== 退出登录 ====== */
    .logout-card {
      margin-top: 20px;
      background: #fff;
      border-radius: 20px;
      padding: 0;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.07);
      border: 1px solid rgba(124, 58, 237, 0.06);
      overflow: hidden;
    }

    .logout-card-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px;
      border: none;
      background: transparent;
      font-size: 15px;
      font-weight: 600;
      color: #ef4444;
      cursor: pointer;
    }

    .logout-card-btn:active {
      background: rgba(239, 68, 68, 0.04);
    }
  </style>
</head>
<body class="h5-skin settings-soft-page">
  <div class="top-bar">
    <div class="bar-left">
      <button class="back-btn" type="button" onclick="history.back()" aria-label="返回">←</button>
    </div>
    <div class="bar-center">设置</div>
    <div class="bar-right"></div>
  </div>

  <div class="settings-page-body">
    <!-- Profile 卡 -->
    <div class="profile-card">
      <div class="profile-inner">
        <div class="profile-avatar-wrap">
          <img id="linxiaomeng-avatar"
               src="/static/images/avatar/default.png"
               alt="林小梦"
               onerror="this.onerror=null;this.src='/static/images/avatar/default.png'">
        </div>
        <div class="profile-info">
          <div class="profile-name-row">
            <div class="profile-name-block">
              <span class="profile-name">林小梦</span>
              <span class="profile-verified" aria-hidden="true">
                <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
                  <path d="M2.5 6.2l2.2 2.2 4.8-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
            </div>
            <div class="profile-online">
              <span class="profile-online-dot"></span>
              <span>在线</span>
            </div>
          </div>
          <div class="profile-bottom-row">
            <span class="profile-status-text" id="profile-status">正在连接...</span>
            <div class="profile-wave" aria-hidden="true">
              <span></span><span></span><span></span><span></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 账号与安全 -->
    <p class="settings-section-label">账号与安全</p>
    <div class="settings-soft-card">
      <div class="settings-item clickable" id="pwd-row" onclick="togglePasswordForm()">
        <div class="settings-item-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="5" y="11" width="14" height="10" rx="2" stroke="#7c3aed" stroke-width="1.8"/>
            <path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="settings-item-body">
          <div class="settings-item-title">修改密码</div>
          <div class="settings-item-desc">定期更新密码，保护账号安全</div>
        </div>
        <div class="settings-item-action">
          <span class="settings-chevron">›</span>
        </div>
      </div>
      <div class="settings-expand-wrap" id="password-form">
        <div class="pwd-field-group">
          <label for="old-password">原密码</label>
          <div class="pwd-input-wrap">
            <input id="old-password" type="password" placeholder="请输入原密码" autocomplete="current-password">
            <button type="button" class="pwd-eye-btn" onclick="togglePwdVisible('old-password', this)" aria-label="显示密码">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z" stroke="currentColor" stroke-width="1.6"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="pwd-field-group">
          <label for="new-password">新密码</label>
          <div class="pwd-input-wrap">
            <input id="new-password" type="password" placeholder="8-20位，含字母和数字" autocomplete="new-password">
            <button type="button" class="pwd-eye-btn" onclick="togglePwdVisible('new-password', this)" aria-label="显示密码">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z" stroke="currentColor" stroke-width="1.6"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="pwd-field-group">
          <label for="confirm-password">确认新密码</label>
          <div class="pwd-input-wrap">
            <input id="confirm-password" type="password" placeholder="再次输入新密码" autocomplete="new-password">
            <button type="button" class="pwd-eye-btn" onclick="togglePwdVisible('confirm-password', this)" aria-label="显示密码">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z" stroke="currentColor" stroke-width="1.6"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="button" class="save-pwd-btn" onclick="handleChangePassword()">保存</button>
      </div>
    </div>

    <!-- 陪伴与偏好 -->
    <p class="settings-section-label">陪伴与偏好</p>
    <div class="settings-soft-card">
      <div class="settings-item">
        <div class="settings-item-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 20.5s-6.5-4.2-6.5-10.2A4.5 4.5 0 0 1 12 5.8a4.5 4.5 0 0 1 6.5 4.5c0 6-6.5 10.2-6.5 10.2z" stroke="#7c3aed" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="settings-item-body">
          <div class="settings-item-title">记忆自动提取</div>
          <div class="settings-item-desc">她会记住你提到的小事和偏好</div>
        </div>
        <div class="settings-item-action">
          <div class="toggle-switch active" id="toggle-memory" onclick="toggleSetting('memory_auto_extract', this)"></div>
        </div>
      </div>
      <div class="settings-item">
        <div class="settings-item-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M3 11.5L21 4l-6.5 17.5-3.2-6.8L3 11.5z" stroke="#7c3aed" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="settings-item-body">
          <div class="settings-item-title">主动消息推送</div>
          <div class="settings-item-desc">她会在合适的时候主动找你聊天</div>
        </div>
        <div class="settings-item-action">
          <div class="toggle-switch active" id="toggle-agent" onclick="toggleSetting('agent_message_enabled', this)"></div>
        </div>
      </div>
    </div>

    <!-- 关于林小梦 -->
    <p class="settings-section-label">关于林小梦</p>
    <div class="settings-soft-card">
      <div class="settings-item clickable" id="about-row" onclick="toggleAbout()">
        <div class="settings-item-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="8" r="3.5" stroke="#7c3aed" stroke-width="1.8"/>
            <path d="M6 20c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="settings-item-body">
          <div class="settings-item-title">关于林小梦</div>
          <div class="settings-item-desc">了解她的故事与设定</div>
        </div>
        <div class="settings-item-action">
          <span class="settings-chevron">›</span>
        </div>
      </div>
      <div class="about-expand-wrap" id="about-content">
        <p class="about-text loading" id="about-text">加载中...</p>
      </div>
    </div>

    <!-- 退出登录 -->
    <div class="logout-card">
      <button type="button" class="logout-card-btn" onclick="handleLogout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>退出登录</span>
      </button>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    checkLogin()

    const DEFAULT_STATUS = '今天状态不错，继续陪伴你吧~'

    const EMOTION_STATUS_MAP = {
      '开心': '今天状态不错，继续陪伴你吧~',
      '平静': '今天也在呢，等你来聊天~',
      '好奇': '对新的一天充满好奇呢~',
      '想念': '有点想你了，来聊聊吧~',
      '担心': '一直在想着你，还好吗~',
      '害羞': '见到你有点开心又不好意思~',
      '困倦': '有点困啦，但还是想陪着你~'
    }

    let aboutLoaded = false

    function resolveStatusText(data) {
      if (!data) return DEFAULT_STATUS
      if (data.status_text) return data.status_text
      const emotion = data.ai_current_emotion
      if (emotion && EMOTION_STATUS_MAP[emotion]) {
        return EMOTION_STATUS_MAP[emotion]
      }
      return DEFAULT_STATUS
    }

    async function loadProfile() {
      const statusEl = document.getElementById('profile-status')
      try {
        const res = await request('GET', '/api/relationship/status')
        if (res.code === 0 && res.data) {
          if (res.data.ai_current_emotion) {
            updateAvatarEmotion(res.data.ai_current_emotion)
          }
          statusEl.textContent = resolveStatusText(res.data)
        } else {
          statusEl.textContent = DEFAULT_STATUS
        }
      } catch (err) {
        console.error('加载 Profile 失败:', err)
        statusEl.textContent = DEFAULT_STATUS
      }
    }

    function togglePwdVisible(inputId, btn) {
      const input = document.getElementById(inputId)
      if (!input) return
      const isHidden = input.type === 'password'
      input.type = isHidden ? 'text' : 'password'
      btn.setAttribute('aria-label', isHidden ? '隐藏密码' : '显示密码')
    }

    /* ====== 修改密码（逻辑不变） ====== */
    function togglePasswordForm() {
      const form = document.getElementById('password-form')
      const row = document.getElementById('pwd-row')
      form.classList.toggle('visible')
      row.classList.toggle('expanded')
    }

    async function handleChangePassword() {
      const oldPwd = document.getElementById('old-password').value
      const newPwd = document.getElementById('new-password').value
      const confirmPwd = document.getElementById('confirm-password').value

      if (!oldPwd || !newPwd || !confirmPwd) {
        showToast('请填写完整', 'error')
        return
      }

      const pwdPattern = /^(?=.*[a-zA-Z])(?=.*\d)[a-zA-Z0-9!@#$%^&*]{8,20}$/
      if (!pwdPattern.test(newPwd)) {
        showToast('新密码需8-20位，含字母和数字', 'error')
        return
      }

      if (newPwd !== confirmPwd) {
        showToast('两次密码不一致', 'error')
        return
      }

      const res = await request('POST', '/api/auth/reset-password', {
        username: localStorage.getItem('username') || '',
        old_password: oldPwd,
        new_password: newPwd
      })

      if (res.code === 0) {
        showToast('密码修改成功', 'success')
        document.getElementById('old-password').value = ''
        document.getElementById('new-password').value = ''
        document.getElementById('confirm-password').value = ''
        togglePasswordForm()
      } else {
        showToast(res.message || '修改失败', 'error')
      }
    }

    /* ====== Toggle 开关（逻辑不变） ====== */
    async function toggleSetting(key, el) {
      const isActive = el.classList.contains('active')
      const newValue = !isActive

      el.classList.toggle('active')

      const body = {}
      body[key] = newValue
      const res = await request('PUT', '/api/user/settings', body)

      if (res.code !== 0) {
        el.classList.toggle('active')
        showToast(res.message || '设置失败', 'error')
      }
    }

    /* ====== 关于：首次展开时懒加载 ====== */
    async function toggleAbout() {
      const content = document.getElementById('about-content')
      const row = document.getElementById('about-row')
      const textEl = document.getElementById('about-text')
      const willOpen = !content.classList.contains('visible')

      content.classList.toggle('visible')
      row.classList.toggle('expanded')

      if (!willOpen || aboutLoaded) return

      aboutLoaded = true
      textEl.textContent = '加载中...'
      textEl.classList.add('loading')

      const res = await request('GET', '/api/app/persona-background')
      textEl.classList.remove('loading')

      if (res.code === 0 && res.data && res.data.background) {
        textEl.textContent = res.data.background
      } else {
        textEl.textContent = '暂时无法加载，请稍后重试'
      }
    }

    /* ====== 退出登录（逻辑不变） ====== */
    async function handleLogout() {
      const ok = await showConfirm(
        '退出登录',
        '确定要退出登录吗？退出后需重新登录',
        '确认退出',
        true
      )
      if (!ok) return

      await request('POST', '/api/auth/logout')
      clearToken()
      localStorage.removeItem('username')
      localStorage.removeItem('relationship_level')
      window.location.href = '/pages/login.html'
    }

    /* ====== 加载用户设置（逻辑不变） ====== */
    async function loadSettings() {
      const res = await request('GET', '/api/user/settings')
      if (res.code === 0 && res.data) {
        const memoryToggle = document.getElementById('toggle-memory')
        const agentToggle = document.getElementById('toggle-agent')

        if (res.data.memory_auto_extract === false) {
          memoryToggle.classList.remove('active')
        }
        if (res.data.agent_message_enabled === false) {
          agentToggle.classList.remove('active')
        }
      }
    }

    loadProfile()
    loadSettings()
  </script>
</body>
</html>
