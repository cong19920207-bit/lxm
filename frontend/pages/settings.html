<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>林小梦 - 设置</title>
  <link rel="stylesheet" href="/static/css/common.css">
  <link rel="stylesheet" href="/static/css/h5-theme.css">
  <style>
    .page-body {
      padding: 56px 16px calc(16px + var(--safe-area-bottom));
    }

    /* 设置卡片 */
    .settings-card {
      margin-bottom: 12px;
    }

    .settings-card .card-title {
      font-size: 13px;
      color: var(--color-gray);
      margin-bottom: 12px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 48px;
      padding: 4px 0;
    }

    .setting-row + .setting-row {
      border-top: 1px solid #F5F0EB;
    }

    .setting-row .row-label {
      font-size: 15px;
      color: var(--color-text);
    }

    .setting-row .row-arrow {
      font-size: 14px;
      color: var(--color-gray);
      transition: transform 0.3s;
    }

    .setting-row.expanded .row-arrow {
      transform: rotate(90deg);
    }

    .setting-row .clickable {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 48px;
    }

    /* 修改密码表单 */
    .password-form {
      display: none;
      padding: 12px 0 4px;
    }

    .password-form.visible {
      display: block;
    }

    .password-form .form-group {
      margin-bottom: 12px;
    }

    .password-form .form-group label {
      display: block;
      font-size: 13px;
      color: var(--color-gray);
      margin-bottom: 4px;
    }

    .password-form .save-pwd-btn {
      width: 100%;
      height: 44px;
      margin-top: 4px;
    }

    /* 关于展开 */
    .about-content {
      display: none;
      padding: 12px 0 4px;
      font-size: 14px;
      line-height: 1.8;
      color: #666;
    }

    .about-content.visible {
      display: block;
    }

    /* 退出按钮 */
    .logout-section {
      margin-top: 32px;
    }

    .logout-btn {
      width: 100%;
      height: 48px;
    }
  </style>
</head>
<body class="h5-skin">
  <!-- 顶部栏 -->
  <div class="top-bar">
    <div class="bar-left">
      <button class="back-btn" onclick="history.back()">←</button>
    </div>
    <div class="bar-center">设置</div>
    <div class="bar-right"></div>
  </div>

  <div class="page-body">
    <!-- 账号与安全 -->
    <div class="card settings-card">
      <div class="card-title">账号与安全</div>
      <div class="setting-row" id="pwd-row">
        <div class="clickable" onclick="togglePasswordForm()">
          <span class="row-label">修改密码</span>
          <span class="row-arrow">›</span>
        </div>
      </div>
      <div class="password-form" id="password-form">
        <div class="form-group">
          <label>原密码</label>
          <input class="input-field" id="old-password" type="password" placeholder="请输入原密码">
        </div>
        <div class="form-group">
          <label>新密码</label>
          <input class="input-field" id="new-password" type="password" placeholder="8-20位，含字母和数字">
        </div>
        <div class="form-group">
          <label>确认新密码</label>
          <input class="input-field" id="confirm-password" type="password" placeholder="再次输入新密码">
        </div>
        <button class="btn-primary save-pwd-btn" onclick="handleChangePassword()">保存</button>
      </div>
    </div>

    <!-- 隐私设置 -->
    <div class="card settings-card">
      <div class="card-title">隐私设置</div>
      <div class="setting-row">
        <span class="row-label">记忆自动提取</span>
        <div class="toggle-switch active" id="toggle-memory" onclick="toggleSetting('memory_auto_extract', this)"></div>
      </div>
      <div class="setting-row">
        <span class="row-label">主动消息推送</span>
        <div class="toggle-switch active" id="toggle-agent" onclick="toggleSetting('agent_message_enabled', this)"></div>
      </div>
    </div>

    <!-- 关于 -->
    <div class="card settings-card">
      <div class="card-title">关于</div>
      <div class="setting-row" id="about-row">
        <div class="clickable" onclick="toggleAbout()">
          <span class="row-label">关于林小梦</span>
          <span class="row-arrow">›</span>
        </div>
      </div>
      <div class="about-content" id="about-content">
        林小梦是一个来自2149年的AI研究员，她的意识因一次实验意外被困在了互联网中。她温柔细腻、好奇心强，总是默默记住你说过的每一件小事。在这里，她会陪你聊天、写日记、记住属于你们的故事。
      </div>
    </div>

    <!-- 退出登录 -->
    <div class="logout-section">
      <button class="btn-danger logout-btn" onclick="handleLogout()">退出登录</button>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    checkLogin()

    /* ====== 修改密码 ====== */
    function togglePasswordForm() {
      const form = document.getElementById('password-form')
      const row = document.getElementById('pwd-row')
      const visible = form.classList.contains('visible')
      form.classList.toggle('visible')
      row.classList.toggle('expanded')
    }

    async function handleChangePassword() {
      const oldPwd = document.getElementById('old-password').value
      const newPwd = document.getElementById('new-password').value
      const confirmPwd = document.getElementById('confirm-password').value

      if (!oldPwd || !newPwd || !confirmPwd) {
        showToast('请填写完整', 'error')
        return
      }

      const pwdPattern = /^(?=.*[a-zA-Z])(?=.*\d)[a-zA-Z0-9!@#$%^&*]{8,20}$/
      if (!pwdPattern.test(newPwd)) {
        showToast('新密码需8-20位，含字母和数字', 'error')
        return
      }

      if (newPwd !== confirmPwd) {
        showToast('两次密码不一致', 'error')
        return
      }

      const res = await request('POST', '/api/auth/reset-password', {
        username: localStorage.getItem('username') || '',
        old_password: oldPwd,
        new_password: newPwd
      })

      if (res.code === 0) {
        showToast('密码修改成功', 'success')
        document.getElementById('old-password').value = ''
        document.getElementById('new-password').value = ''
        document.getElementById('confirm-password').value = ''
        togglePasswordForm()
      } else {
        showToast(res.message || '修改失败', 'error')
      }
    }

    /* ====== Toggle 开关 ====== */
    async function toggleSetting(key, el) {
      const isActive = el.classList.contains('active')
      const newValue = !isActive

      el.classList.toggle('active')

      const body = {}
      body[key] = newValue
      const res = await request('PUT', '/api/user/settings', body)

      if (res.code !== 0) {
        // 回滚
        el.classList.toggle('active')
        showToast(res.message || '设置失败', 'error')
      }
    }

    /* ====== 关于展开 ====== */
    function toggleAbout() {
      const content = document.getElementById('about-content')
      const row = document.getElementById('about-row')
      content.classList.toggle('visible')
      row.classList.toggle('expanded')
    }

    /* ====== 退出登录 ====== */
    async function handleLogout() {
      const ok = await showConfirm(
        '退出登录',
        '确定要退出登录吗？退出后需重新登录',
        '确认退出',
        true
      )
      if (!ok) return

      await request('POST', '/api/auth/logout')
      clearToken()
      localStorage.removeItem('username')
      localStorage.removeItem('relationship_level')
      window.location.href = '/pages/login.html'
    }

    /* ====== 加载用户设置 ====== */
    async function loadSettings() {
      const res = await request('GET', '/api/user/settings')
      if (res.code === 0 && res.data) {
        const memoryToggle = document.getElementById('toggle-memory')
        const agentToggle = document.getElementById('toggle-agent')

        if (res.data.memory_auto_extract === false) {
          memoryToggle.classList.remove('active')
        }
        if (res.data.agent_message_enabled === false) {
          agentToggle.classList.remove('active')
        }
      }
    }

    loadSettings()
  </script>
</body>
</html>
