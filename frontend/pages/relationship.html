<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>林小梦 - 我们的关系</title>
  <link rel="stylesheet" href="/static/css/common.css">
  <link rel="stylesheet" href="/static/css/h5-theme.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    /* ========== 关系页独立暗黑主题（scoped，不影响其他 H5 页） ========== */
    html:has(> body.relationship-page),
    body.h5-skin.relationship-page {
      background: #050508;
      color: #f3f4f6;
    }

    body.relationship-page .top-bar {
      display: none;
    }

    body.relationship-page .page-body {
      padding: 0 0 calc(24px + env(safe-area-inset-bottom, 0px));
      animation: none;
    }

    .rel-page {
      min-height: 100vh;
      background: linear-gradient(180deg, #050508 0%, #0c0a12 40%, #050508 100%);
    }

    /* Hero */
    .rel-hero {
      position: relative;
      min-height: 52vh;
      max-height: 480px;
      background: #0a0810 url('/static/images/relationship/Relationship_Lxm.png') center top / cover no-repeat;
    }

    .rel-hero::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 55%;
      background: linear-gradient(180deg, rgba(5, 5, 8, 0) 0%, rgba(5, 5, 8, 0.75) 55%, #050508 100%);
      pointer-events: none;
    }

    .rel-hero-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(10px + env(safe-area-inset-top, 0px)) 16px 12px;
    }

    .rel-hero-bar .back-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .rel-hero-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(88, 28, 135, 0.55);
      border: 1px solid rgba(192, 132, 252, 0.45);
      color: #f5f3ff;
      font-size: 13px;
      font-weight: 500;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .rel-hero-pill svg {
      flex-shrink: 0;
    }

    .rel-hero-profile {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 50px;
      z-index: 3;
      padding: 0 20px 16px;
    }

    .rel-name-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
    }

    .rel-name {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .rel-level-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      color: #e9d5ff;
      background: rgba(126, 34, 206, 0.55);
      border: 1px solid rgba(192, 132, 252, 0.65);
      box-shadow: 0 0 12px rgba(168, 85, 247, 0.35);
    }

    .rel-desc {
      font-size: 14px;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.88);
      margin-bottom: 14px;
    }

    .rel-perks {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .rel-perk-tag {
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: #e9d5ff;
      border: 1px solid rgba(168, 85, 247, 0.55);
      background: rgba(88, 28, 135, 0.25);
    }

    .rel-hero-foot {
      min-height: 22px;
    }

    /* 主内容区（统计 + 各卡片整体上移，Hero 林小梦区不动） */
    .rel-main {
      position: relative;
      z-index: 4;
      margin-top: -50px;
      padding: 8px 16px 0;
    }

    .rel-section-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 14px;
    }

    .rel-section-title .spark {
      color: #c084fc;
      font-size: 14px;
    }

    /* 统计四列 */
    .rel-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 20px;
      padding: 16px 8px;
      border-radius: 16px;
      background: rgba(26, 26, 34, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .rel-stat-item {
      text-align: center;
      padding: 4px 2px;
    }

    .rel-stat-item .m-value {
      font-size: 22px;
      font-weight: 700;
      color: #c084fc;
      line-height: 1.2;
      text-shadow: 0 0 20px rgba(168, 85, 247, 0.45);
    }

    .rel-stat-item .m-value.warn {
      color: #fb923c;
      text-shadow: 0 0 16px rgba(251, 146, 60, 0.4);
    }

    .rel-stat-item .m-label {
      font-size: 11px;
      color: #fff;
      margin-top: 6px;
      font-weight: 500;
    }

    .rel-stat-item .m-sub {
      font-size: 10px;
      color: #9ca3af;
      margin-top: 4px;
      line-height: 1.35;
    }

    /* 卡片通用 */
    .rel-card {
      position: relative;
      background: rgba(22, 22, 30, 0.95);
      border-radius: 18px;
      padding: 18px 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    .rel-card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .rel-card-head .rel-section-title {
      margin-bottom: 0;
    }

    .rel-handwrite {
      font-family: 'Ma Shan Zheng', "STKaiti", "KaiTi", cursive;
      color: #e879f9;
      font-size: 17px;
      line-height: 1.25;
      opacity: 0.95;
      text-shadow: 0 0 14px rgba(168, 85, 247, 0.4);
      flex-shrink: 0;
      white-space: nowrap;
      text-align: right;
    }

    #progress-section .rel-handwrite {
      transform: translateX(-50px);
    }

    @media (max-width: 360px) {
      #progress-section .rel-handwrite {
        transform: translateX(-28px);
      }
    }

    /* 亲密进度 */
    .rel-progress-wrap {
      padding-right: 104px;
    }

    .rel-progress-bar {
      width: 100%;
      height: 13px;
      background: #2a2a34;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      overflow: hidden;
      cursor: pointer;
    }

    .rel-progress-fill {
      height: 100%;
      width: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, #7c3aed 0%, #a855f7 100%);
      box-shadow: 0 0 8px rgba(168, 85, 247, 0.45);
      transition: width 0.6s ease-out;
    }

    .rel-progress-stats {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 9px;
      font-size: 12px;
      color: #9ca3af;
    }

    .rel-progress-stats .rel-stat-num {
      font-style: normal;
      font-weight: 600;
      color: #e5e7eb;
    }

    .rel-progress-stats .rel-stat-muted {
      color: #9ca3af;
      font-weight: 400;
    }

    .rel-progress-stats .rel-stat-upgrade {
      font-weight: 600;
    }

    .rel-progress-tip {
      text-align: center;
      font-size: 13px;
      color: #e879f9;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .rel-progress-tip.visible {
      opacity: 1;
    }

    .rel-next-toggle {
      display: flex;
      align-items: center;
      margin-top: 10px;
      font-size: 12px;
      color: #6b7280;
      cursor: pointer;
      user-select: none;
      line-height: 1.45;
    }

    .rel-next-toggle .arrow {
      display: none;
    }

    .rel-next-list {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .rel-next-list.open {
      max-height: 200px;
    }

    .rel-next-list .perk-item {
      padding: 6px 0;
      font-size: 13px;
      color: #d1d5db;
    }

    .rel-max-badge {
      text-align: center;
      padding: 12px 0;
    }

    .rel-max-badge .big {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }

    .rel-max-badge .sub {
      font-size: 14px;
      color: #9ca3af;
    }

    /* 拍立得（-8deg + 极窄底边留白，多露照片） */
    .rel-polaroid {
      position: absolute;
      right: 6px;
      top: 44%;
      transform: translateY(-50%) rotate(-8deg);
      width: 92px;
      z-index: 2;
      pointer-events: none;
    }

    .rel-polaroid-frame {
      background: #fff;
      padding: 4px 4px 5px;
      border-radius: 2px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.5),
                  0 12px 32px rgba(88, 28, 135, 0.32);
    }

    .rel-polaroid-frame img {
      width: 84px;
      height: 108px;
      object-fit: cover;
      object-position: center top;
      display: block;
      background: #1f1f28;
      transform: translateY(-8px);
    }

    .rel-polaroid-caption {
      font-family: 'Ma Shan Zheng', "STKaiti", "KaiTi", cursive;
      font-size: 11px;
      color: #d8b4fe;
      text-align: center;
      margin-top: 2px;
      line-height: 1.1;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .rel-polaroid-heart {
      position: absolute;
      right: 2px;
      bottom: 16px;
      font-size: 15px;
      color: #c084fc;
      filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.55));
    }

    /* 今日成长横排四列 */
    .rel-today-total {
      font-size: 14px;
      color: #c084fc;
      font-weight: 600;
      white-space: nowrap;
    }

    .rel-today-total.empty {
      color: #6b7280;
      font-weight: 500;
    }

    .rel-today-grid {
      display: flex;
      flex-direction: row;
      gap: 8px;
      align-items: stretch;
    }

    .rel-task-card {
      position: relative;
      flex: 1;
      min-width: 0;
      background: #1e1e28;
      border-radius: 12px;
      padding: 10px 6px 26px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      min-height: 96px;
      display: flex;
      flex-direction: column;
    }

    .rel-task-card .tc-icon {
      font-size: 18px;
      margin-bottom: 6px;
      filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.35));
    }

    .rel-task-card .tc-title {
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
      padding-right: 2px;
    }

    .rel-task-card .tc-sub {
      font-size: 10px;
      color: #9ca3af;
      margin-top: 3px;
      line-height: 1.3;
      padding-right: 2px;
    }

    .rel-task-card .tc-status {
      position: absolute;
      right: 6px;
      bottom: 8px;
      text-align: right;
    }

    .rel-task-card .tc-foot {
      font-size: 13px;
      font-weight: 600;
      color: #c084fc;
      line-height: 1;
    }

    .rel-task-card .tc-done {
      font-size: 12px;
      color: #4ade80;
      font-weight: 600;
      line-height: 1.2;
    }

    .rel-task-card .streak-tag {
      font-size: 9px;
      color: #fb923c;
      margin-top: 3px;
      line-height: 1.25;
    }

    @media (max-width: 360px) {
      .rel-task-card .tc-title {
        font-size: 11px;
      }

      .rel-task-card .tc-sub {
        font-size: 9px;
      }
    }

    /* 时间轴 */
    .rel-timeline-wrap {
      position: relative;
    }

    .rel-timeline-deco {
      position: absolute;
      right: 0;
      top: 0;
      max-width: 38%;
      text-align: right;
      pointer-events: none;
    }

    .timeline-empty {
      text-align: center;
      font-style: italic;
      color: #9ca3af;
      font-size: 14px;
      line-height: 1.8;
      padding: 12px 0;
      white-space: pre-line;
    }

    .timeline-list {
      position: relative;
      padding-left: 24px;
      padding-right: 0;
    }

    .timeline-list::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: rgba(168, 85, 247, 0.35);
    }

    .timeline-node {
      position: relative;
      padding: 10px 0;
    }

    .timeline-node::before {
      content: '';
      position: absolute;
      left: -20px;
      top: 16px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #7c3aed;
      border: 2px solid #16161e;
      box-shadow: 0 0 0 2px #a855f7;
    }

    .timeline-node.current::before {
      background: #fb923c;
      box-shadow: 0 0 0 2px #fb923c, 0 0 10px rgba(251, 146, 60, 0.5);
    }

    .timeline-node .tn-title {
      font-size: 14px;
      font-weight: 500;
      color: #f3f4f6;
    }

    .timeline-node.current .tn-title {
      font-weight: 600;
      color: #fff;
    }

    .timeline-node .tn-time {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
    }

    /* 成长记录 */
    .rel-log-total {
      font-size: 12px;
      color: #9ca3af;
    }

    .log-date-sep {
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      padding: 10px 0 6px;
    }

    .log-item {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .log-item:last-child {
      border-bottom: none;
    }

    .log-item .li-icon-slot {
      width: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .log-item .li-body {
      flex: 1;
      min-width: 0;
      padding-left: 4px;
    }

    .log-item .li-label {
      font-size: 14px;
      color: #f3f4f6;
    }

    .log-item .li-time {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 2px;
    }

    .log-item .li-points {
      font-size: 14px;
      font-weight: 600;
      color: #c084fc;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .no-more-text {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      padding: 16px 0 8px;
    }

    /* 骨架屏 */
    .skeleton-wrap {
      padding: 16px;
    }

    .skeleton-hero {
      height: 280px;
      border-radius: 0;
      margin: 0 -16px 16px;
    }

    .skeleton-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .skeleton-stats .skeleton {
      height: 72px;
      border-radius: 12px;
    }

    .skeleton-block {
      height: 140px;
      border-radius: 16px;
      margin-bottom: 16px;
    }

    body.relationship-page .skeleton {
      background: linear-gradient(90deg, #1a1a22 25%, #252530 50%, #1a1a22 75%);
      background-size: 200% 100%;
    }

    .content-loaded .skeleton-wrap { display: none; }
    .content-loaded .real-content { display: block !important; }
    .real-content { display: none !important; }

    /* 升级弹窗（暗黑） */
    .levelup-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.72);
      z-index: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: rel-fade-in 0.3s forwards;
    }

    .levelup-overlay.closing {
      animation: rel-fade-out 0.3s forwards;
    }

    .levelup-box {
      width: 300px;
      background: linear-gradient(165deg, #1e1e28 0%, #121218 100%);
      border-radius: 24px;
      padding: 32px 24px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(168, 85, 247, 0.35);
      box-shadow: 0 0 40px rgba(124, 58, 237, 0.25);
    }

    .levelup-box .lu-title {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .levelup-box .lu-subtitle {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 16px;
    }

    .levelup-box .lu-perks {
      text-align: left;
      margin-bottom: 20px;
    }

    .levelup-box .lu-perks .lu-perk {
      padding: 6px 0;
      font-size: 14px;
      color: #d1d5db;
    }

    .levelup-box .lu-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(90deg, #7c3aed, #c084fc);
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      border: none;
    }

    .levelup-box .lu-btn:active {
      transform: scale(0.97);
    }

    .particles {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: particle-float 2s ease-out forwards;
    }

    @keyframes particle-float {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-120px) scale(0.3); opacity: 0; }
    }

    @keyframes rel-fade-in {
      to { opacity: 1; }
    }

    @keyframes rel-fade-out {
      to { opacity: 0; }
    }

    /* 覆盖 h5-theme 对本页旧 class 的全局 neo 样式 */
    body.relationship-page .milestone-item,
    body.relationship-page .level-card,
    body.relationship-page .progress-section,
    body.relationship-page .today-section,
    body.relationship-page .timeline-section,
    body.relationship-page .log-section {
      border: none;
      box-shadow: none;
      background: transparent;
    }
  </style>
</head>
<body class="h5-skin relationship-page">
  <div class="rel-page" id="page-body">
    <div class="skeleton-wrap">
      <div class="skeleton skeleton-hero"></div>
      <div class="skeleton-stats">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
      <div class="skeleton skeleton-block"></div>
      <div class="skeleton skeleton-block"></div>
    </div>

    <div class="real-content">
      <section class="rel-hero" aria-label="林小梦">
        <div class="rel-hero-bar">
          <button type="button" class="back-btn" onclick="history.back()" aria-label="返回">←</button>
          <div class="rel-hero-pill" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 20.5s-6.5-4.2-6.5-10.2A4.5 4.5 0 0 1 12 5.8a4.5 4.5 0 0 1 6.5 4.5c0 6-6.5 10.2-6.5 10.2z" stroke="#e9d5ff" stroke-width="2" stroke-linejoin="round"/>
            </svg>
            <span>我们的关系</span>
          </div>
        </div>
        <div class="rel-hero-profile">
          <div class="rel-name-row">
            <h1 class="rel-name">林小梦</h1>
            <span class="rel-level-badge" id="rel-level-badge"></span>
          </div>
          <p class="rel-desc" id="rel-desc"></p>
          <div class="rel-perks" id="rel-perks"></div>
          <div class="rel-hero-foot" aria-hidden="true"></div>
        </div>
      </section>

      <div class="rel-main">
        <div class="rel-stats" id="milestone-grid">
          <div class="rel-stat-item">
            <div class="m-value" id="m-known-days">0</div>
            <div class="m-label">相识时间</div>
            <div class="m-sub" id="m-known-sub"></div>
          </div>
          <div class="rel-stat-item">
            <div class="m-value" id="m-conv-rounds">0</div>
            <div class="m-label">聊天记录</div>
            <div class="m-sub">我们聊过的点滴</div>
          </div>
          <div class="rel-stat-item">
            <div class="m-value" id="m-login-days">0</div>
            <div class="m-label">连续登录</div>
            <div class="m-sub">连续陪伴你</div>
          </div>
          <div class="rel-stat-item">
            <div class="m-value" id="m-silence-days">0</div>
            <div class="m-label">距上次</div>
            <div class="m-sub" id="m-silence-sub"></div>
          </div>
        </div>

        <div class="rel-card" id="progress-section">
          <div class="rel-card-head">
            <div class="rel-section-title"><span class="spark">✦</span> 亲密进度</div>
            <span class="rel-handwrite" aria-hidden="true">继续加油哦~ ♡</span>
          </div>
          <div id="progress-content" class="rel-progress-wrap"></div>
          <div class="rel-polaroid" aria-hidden="true">
            <div class="rel-polaroid-frame">
              <img id="linxiaomeng-avatar"
                   src="/static/images/avatar/default.png"
                   alt=""
                   onerror="this.onerror=null;this.src='/static/images/avatar/default.png'">
              <div class="rel-polaroid-caption">想和你去看海。</div>
            </div>
            <span class="rel-polaroid-heart">♥</span>
          </div>
        </div>

        <div class="rel-card">
          <div class="rel-card-head">
            <div class="rel-section-title"><span class="spark">✦</span> 今日成长</div>
            <div class="rel-today-total" id="today-total"></div>
          </div>
          <div class="rel-today-grid" id="today-list"></div>
        </div>

        <div class="rel-card">
          <div class="rel-card-head">
            <div class="rel-section-title"><span class="spark">✦</span> 成长历程</div>
          </div>
          <div class="rel-timeline-wrap">
            <p class="rel-timeline-deco rel-handwrite" aria-hidden="true">未来有很多故事<br>我们一起写下去吧 ♡</p>
            <div id="timeline-content"></div>
          </div>
        </div>

        <div class="rel-card">
          <div class="rel-card-head">
            <div class="rel-section-title"><span class="spark">✦</span> 成长记录</div>
            <span class="rel-log-total" id="log-total"></span>
          </div>
          <div id="log-list"></div>
          <div class="load-more-sentinel" id="log-sentinel"></div>
          <div class="no-more-text" id="log-no-more" style="display:none">已经到底啦 ✨</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    checkLogin()

    const ICON_MAP = {
      dialog: '💬',
      long_session: '⏱',
      daily_login: '📅',
      reply_agent: '💌'
    }

    let logPage = 1
    let logLoading = false
    let logNoMore = false
    let pageData = null

    async function loadPage() {
      try {
        const res = await request('GET', '/api/relationship/detail')
        if (res.code !== 0 || !res.data) {
          showToast('加载失败，请重试', 'error')
          document.getElementById('page-body').classList.add('content-loaded')
          return
        }

        pageData = res.data
        renderHeroProfile(pageData.level_info, pageData.ai_current_emotion)
        renderMilestones(pageData.milestones)
        renderProgress(pageData.level_info, pageData.growth_info)
        renderTodayGrowth(pageData.today_growth, pageData.milestones.consecutive_login_days)
        renderTimeline(pageData.level_history, pageData.level_info, pageData.milestones)

        document.getElementById('page-body').classList.add('content-loaded')

        animateNumbers()

        await loadGrowthLog()

        checkLevelUpParam(pageData.level_info)
      } catch (err) {
        console.error('加载失败:', err)
        document.getElementById('page-body').classList.add('content-loaded')
        showToast('加载失败，请重试', 'error')
      }
    }

    function renderHeroProfile(info, emotion) {
      document.getElementById('rel-level-badge').textContent = info.name || '陌生'
      document.getElementById('rel-desc').textContent = info.description || ''

      const perksEl = document.getElementById('rel-perks')
      perksEl.innerHTML = ''
      ;(info.perks || []).forEach(function (p) {
        const tag = document.createElement('span')
        tag.className = 'rel-perk-tag'
        tag.textContent = p
        perksEl.appendChild(tag)
      })

      if (emotion) {
        updateAvatarEmotion(emotion)
      }
    }

    function renderMilestones(ms) {
      document.getElementById('m-known-days').setAttribute('data-target', ms.known_days)
      document.getElementById('m-known-days').textContent = '0'
      document.getElementById('m-known-sub').textContent =
        '和你相遇的第 ' + (ms.known_days || 0) + ' 天'

      document.getElementById('m-conv-rounds').setAttribute('data-target', ms.total_conversation_rounds)
      document.getElementById('m-conv-rounds').textContent = '0'

      document.getElementById('m-login-days').setAttribute('data-target', ms.consecutive_login_days)
      document.getElementById('m-login-days').textContent = '0'

      document.getElementById('m-silence-days').setAttribute('data-target', ms.silence_days)
      document.getElementById('m-silence-days').textContent = '0'

      const silenceEl = document.getElementById('m-silence-days')
      if (ms.silence_days > 7) {
        silenceEl.classList.add('warn')
      } else {
        silenceEl.classList.remove('warn')
      }

      const silenceSub = document.getElementById('m-silence-sub')
      if (!ms.silence_days) {
        silenceSub.textContent = '从不远离你'
      } else {
        silenceSub.textContent = '已经 ' + ms.silence_days + ' 天没见了'
      }
    }

    function animateNumbers() {
      const els = document.querySelectorAll('[data-target]')
      els.forEach(function (el) {
        const target = parseInt(el.getAttribute('data-target'), 10) || 0
        if (target === 0) {
          el.textContent = '0'
          return
        }
        const start = performance.now()
        const duration = 300
        function tick(now) {
          const progress = Math.min((now - start) / duration, 1)
          const eased = 1 - Math.pow(1 - progress, 3)
          el.textContent = Math.round(target * eased)
          if (progress < 1) requestAnimationFrame(tick)
        }
        requestAnimationFrame(tick)
      })
    }

    function renderProgress(levelInfo, growthInfo) {
      const container = document.getElementById('progress-content')
      const polaroid = document.querySelector('.rel-polaroid')

      if (growthInfo.is_max_level) {
        if (polaroid) polaroid.style.display = 'none'
        container.className = ''
        container.innerHTML =
          '<div class="rel-max-badge">' +
            '<div class="big">已达到最高等级「知己」✨</div>' +
            '<div class="sub">林小梦与你之间，已建立最深的情感连接</div>' +
          '</div>'
        return
      }

      if (polaroid) polaroid.style.display = ''
      container.className = 'rel-progress-wrap'

      const nextLevelName = levelInfo.next_level_name || '下一级'
      const firstPerk = (levelInfo.next_perks && levelInfo.next_perks[0]) || '更多互动'
      const unlockLine = '解锁「' + nextLevelName + '」后，可获得' + firstPerk + ' >'

      container.innerHTML =
        '<div class="rel-progress-bar" id="detail-bar" onclick="showProgressTip()" role="button" tabindex="0">' +
          '<div class="rel-progress-fill" id="detail-fill"></div>' +
        '</div>' +
        '<div class="rel-progress-stats">' +
          '<span>已积累 <em class="rel-stat-num">' + growthInfo.points_in_level + '</em> / <em class="rel-stat-num">' +
            growthInfo.points_needed + '</em> <span class="rel-stat-muted">亲密值</span></span>' +
          '<span>还差 <em class="rel-stat-num">' + growthInfo.points_to_next + '</em> <span class="rel-stat-upgrade">升级</span></span>' +
        '</div>' +
        '<div class="rel-progress-tip" id="progress-tip"></div>' +
        '<div class="rel-next-toggle" onclick="toggleNextPerks()">' +
          '<span>' + unlockLine + '</span>' +
          '<span class="arrow" aria-hidden="true">▼</span>' +
        '</div>' +
        '<div class="rel-next-list" id="next-perks-list">' +
          (levelInfo.next_perks || []).map(function (p) {
            return '<div class="perk-item">✨ ' + p + '</div>'
          }).join('') +
        '</div>'

      setTimeout(function () {
        const fill = document.getElementById('detail-fill')
        if (fill) fill.style.width = growthInfo.progress_percent + '%'
      }, 100)
    }

    function showProgressTip() {
      if (!pageData || pageData.growth_info.is_max_level) return
      const tip = document.getElementById('progress-tip')
      const rounds = Math.ceil(pageData.growth_info.points_to_next / 2)
      tip.textContent = '再聊 ' + rounds + ' 轮就能升级啦～'
      tip.classList.add('visible')
      setTimeout(function () { tip.classList.remove('visible') }, 2000)
    }

    function toggleNextPerks() {
      const toggle = document.querySelector('.rel-next-toggle')
      const list = document.getElementById('next-perks-list')
      if (!toggle || !list) return
      toggle.classList.toggle('open')
      list.classList.toggle('open')
    }

    function renderTodayGrowth(tg, consecutiveDays) {
      const totalEl = document.getElementById('today-total')
      if (tg.today_total_points > 0) {
        totalEl.textContent = '今日总计 +' + tg.today_total_points + ' 亲密值'
        totalEl.className = 'rel-today-total'
      } else {
        totalEl.textContent = '今天还没有互动哦'
        totalEl.className = 'rel-today-total empty'
      }

      const list = document.getElementById('today-list')
      const items = [
        {
          icon: '💬',
          title: '完成对话',
          points: tg.today_dialog_points,
          sub: tg.today_dialog_limit_reached
            ? null
            : '还差获得 ' + tg.today_remaining_dialog + ' 分',
          done: tg.today_dialog_limit_reached,
          doneText: '今日已满'
        },
        {
          icon: '🎙',
          title: '深度聊天',
          points: tg.today_session_points,
          sub: tg.today_session_points === 0 ? '聊够10分钟可获得+20分' : null,
          done: tg.today_session_points >= 20,
          doneText: '已完成'
        },
        {
          icon: '📅',
          title: '每日登录',
          points: tg.today_login_points,
          sub: tg.today_login_points === 0 ? '今日登录 +5' : null,
          done: tg.today_login_points > 0,
          doneText: '已完成',
          streak: consecutiveDays >= 7 ? '连续' + consecutiveDays + '天奖励中🔥' : null
        },
        {
          icon: '💌',
          title: '回复消息',
          points: tg.today_reply_points,
          sub: tg.today_reply_points === 0 ? '回复可获得+10分' : null,
          done: tg.today_reply_points > 0,
          doneText: '已完成'
        }
      ]

      list.innerHTML = items.map(function (item) {
        let footHtml
        if (item.done) {
          footHtml = '<span class="tc-done">' + item.doneText + '</span>'
        } else {
          footHtml = '<span class="tc-foot">' + item.points + '分</span>'
        }

        let subHtml = ''
        if (item.sub) {
          subHtml = '<div class="tc-sub">' + item.sub + '</div>'
        }
        if (item.streak) {
          subHtml += '<div class="streak-tag">' + item.streak + '</div>'
        }

        return '<div class="rel-task-card">' +
          '<div class="tc-icon">' + item.icon + '</div>' +
          '<div class="tc-title">' + item.title + '</div>' +
          subHtml +
          '<div class="tc-status">' + footHtml + '</div>' +
        '</div>'
      }).join('')
    }

    function renderTimeline(history, levelInfo, milestones) {
      const container = document.getElementById('timeline-content')

      if (!history || history.length === 0) {
        let text = '我们的故事，从这里开始'
        if (milestones.first_conversation_at) {
          const d = new Date(milestones.first_conversation_at)
          text = '我们相识于 ' + (d.getMonth() + 1) + '月' + d.getDate() + '日，\n从陌生人开始，慢慢走到了现在'
        }
        container.innerHTML = '<div class="timeline-empty">' + text + '</div>'
        return
      }

      let html = '<div class="timeline-list">'
      html += '<div class="timeline-node current">' +
        '<div class="tn-title">★ 当前是「' + levelInfo.name + '」</div>' +
        '<div class="tn-time">一直在这里陪着你</div>' +
      '</div>'

      history.forEach(function (h) {
        const d = new Date(h.achieved_at)
        const timeStr = (d.getMonth() + 1) + '月' + d.getDate() + '日 ' +
          String(d.getHours()).padStart(2, '0') + ':' +
          String(d.getMinutes()).padStart(2, '0')
        html += '<div class="timeline-node">' +
          '<div class="tn-title">● 升级为「' + h.level_name + '」</div>' +
          '<div class="tn-time">' + timeStr + '</div>' +
        '</div>'
      })

      html += '</div>'
      container.innerHTML = html
    }

    async function loadGrowthLog() {
      if (logLoading || logNoMore) return
      logLoading = true

      const res = await request('GET', '/api/relationship/growth-log?page=' + logPage + '&page_size=20')
      if (res.code !== 0 || !res.data) {
        logLoading = false
        return
      }

      const data = res.data
      document.getElementById('log-total').textContent = '共 ' + data.total + ' 条'

      if (data.list.length === 0 && logPage === 1) {
        document.getElementById('log-list').innerHTML =
          '<div class="timeline-empty">暂无成长记录</div>'
        logNoMore = true
        logLoading = false
        return
      }

      const listEl = document.getElementById('log-list')
      let lastDateStr = ''
      const prevItems = listEl.querySelectorAll('.log-item')
      if (prevItems.length > 0) {
        lastDateStr = prevItems[prevItems.length - 1].getAttribute('data-date') || ''
      }

      data.list.forEach(function (item) {
        const d = new Date(item.created_at)
        const dateStr = (d.getMonth() + 1) + '月' + d.getDate() + '日'

        if (dateStr !== lastDateStr) {
          const sep = document.createElement('div')
          sep.className = 'log-date-sep'
          sep.textContent = dateStr
          listEl.appendChild(sep)
          lastDateStr = dateStr
        }

        const row = document.createElement('div')
        row.className = 'log-item'
        row.setAttribute('data-date', dateStr)

        const icon = ICON_MAP[item.action_type] || '📌'
        const timeStr = String(d.getHours()).padStart(2, '0') + ':' +
                        String(d.getMinutes()).padStart(2, '0')

        row.innerHTML =
          '<div class="li-icon-slot" aria-hidden="true">' + icon + '</div>' +
          '<div class="li-body">' +
            '<div class="li-label">' + item.action_label + '</div>' +
            '<div class="li-time">' + timeStr + '</div>' +
          '</div>' +
          '<div class="li-points">+' + item.points + '分</div>'

        listEl.appendChild(row)
      })

      if (data.list.length < 20 || logPage * 20 >= data.total) {
        logNoMore = true
        document.getElementById('log-no-more').style.display = 'block'
      }

      logPage++
      logLoading = false
    }

    const logObserver = new IntersectionObserver(function (entries) {
      if (entries[0].isIntersecting && !logLoading && !logNoMore) {
        loadGrowthLog()
      }
    }, { threshold: 0 })

    const sentinel = document.getElementById('log-sentinel')
    if (sentinel) logObserver.observe(sentinel)

    function checkLevelUpParam(levelInfo) {
      const params = new URLSearchParams(window.location.search)
      if (params.get('just_leveled_up') !== 'true') return

      setTimeout(function () {
        showLevelUpModal(levelInfo)
      }, 500)

      history.replaceState(null, '', window.location.pathname)
    }

    function showLevelUpModal(info) {
      const overlay = document.createElement('div')
      overlay.className = 'levelup-overlay'

      let perksHtml = ''
      ;(info.perks || []).forEach(function (p) {
        perksHtml += '<div class="lu-perk">✨ ' + p + '</div>'
      })

      overlay.innerHTML =
        '<div class="levelup-box">' +
          '<div class="particles" id="lu-particles"></div>' +
          '<div class="lu-title">🎉 恭喜升级！</div>' +
          '<div class="lu-subtitle">我们现在是「' + info.name + '」了</div>' +
          '<div class="lu-perks">' + perksHtml + '</div>' +
          '<button type="button" class="lu-btn" id="lu-close-btn">继续聊天</button>' +
        '</div>'

      document.body.appendChild(overlay)

      createParticles(document.getElementById('lu-particles'))

      document.getElementById('lu-close-btn').onclick = function () {
        closeLevelUp(overlay)
      }

      overlay.addEventListener('click', function (e) {
        if (e.target === overlay) closeLevelUp(overlay)
      })
    }

    function closeLevelUp(overlay) {
      overlay.classList.add('closing')
      overlay.addEventListener('animationend', function () {
        overlay.remove()
      })
    }

    function createParticles(container) {
      if (!container) return
      const colors = ['#c084fc', '#e879f9', '#a855f7', '#f0abfc', '#ddd6fe', '#f9a8d4']
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div')
        p.className = 'particle'
        const size = 4 + Math.random() * 8
        p.style.width = size + 'px'
        p.style.height = size + 'px'
        p.style.background = colors[Math.floor(Math.random() * colors.length)]
        p.style.left = Math.random() * 100 + '%'
        p.style.top = 60 + Math.random() * 40 + '%'
        p.style.animationDelay = Math.random() * 1 + 's'
        p.style.animationDuration = (1.5 + Math.random() * 1) + 's'
        container.appendChild(p)
      }
    }

    loadPage()
  </script>
</body>
</html>
