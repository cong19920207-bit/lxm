<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>林小梦</title>
  <link rel="stylesheet" href="/static/css/common.css">
  <style>
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 顶部栏 */
    .top-bar .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text);
    }

    .top-bar .settings-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .top-bar .settings-btn:active {
      background: rgba(0, 0, 0, 0.05);
    }

    /* 核心内容区 */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px 24px;
    }

    /* 头像区 */
    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
    }

    .avatar-section .avatar-wrapper {
      margin-bottom: 12px;
    }

    .avatar-section .name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .avatar-section .status-text {
      font-size: 14px;
      color: var(--color-gray);
    }

    /* 关系区域 */
    .relationship-section {
      width: 100%;
      max-width: 320px;
      text-align: center;
      margin-bottom: 32px;
    }

    .relationship-section .level-name {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 12px;
      color: var(--color-text);
    }

    .relationship-section .progress-info {
      font-size: 12px;
      color: var(--color-gray);
      margin-top: 8px;
    }

    /* 按钮区域 */
    .action-section {
      width: 100%;
      max-width: 320px;
      margin-top: auto;
      padding-bottom: calc(24px + var(--safe-area-bottom));
    }

    .chat-btn {
      width: 100%;
      height: 52px;
      font-size: 18px;
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .sub-actions {
      display: flex;
      gap: 8px;
    }

    .sub-actions .btn-secondary {
      flex: 1;
      font-size: 13px;
      padding: 10px 4px;
    }

    /* 骨架屏 */
    .skeleton-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
    }

    .skeleton-text {
      height: 16px;
      width: 80px;
      margin: 8px auto;
    }

    .skeleton-text-long {
      height: 14px;
      width: 140px;
      margin: 6px auto;
    }

    .skeleton-progress {
      height: 8px;
      width: 100%;
      margin: 16px auto 0;
    }

    .content-loaded .skeleton-wrap { display: none; }
    .content-loaded .real-content { display: flex !important; }
    .real-content { display: none !important; }
  </style>
</head>
<body>
  <div class="page">
    <!-- 顶部栏 -->
    <div class="top-bar">
      <div class="bar-left">
        <div class="user-avatar" id="user-initial">-</div>
      </div>
      <div class="bar-center"></div>
      <div class="bar-right">
        <button class="settings-btn" onclick="location.href='/pages/settings.html'">⚙️</button>
      </div>
    </div>

    <div class="main-content" id="main-content">
      <!-- 骨架屏 -->
      <div class="skeleton-wrap">
        <div class="avatar-section">
          <div class="skeleton skeleton-avatar"></div>
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-text-long"></div>
        </div>
        <div class="relationship-section">
          <div class="skeleton skeleton-text" style="width:120px"></div>
          <div class="skeleton skeleton-progress"></div>
        </div>
      </div>

      <!-- 真实内容 -->
      <div class="real-content" style="flex-direction:column;align-items:center;width:100%;flex:1">
        <div class="avatar-section">
          <div class="avatar-wrapper" style="width:120px;height:120px">
            <img id="linxiaomeng-avatar"
                 src="/static/images/avatar/default.png"
                 alt="林小梦"
                 style="width:120px;height:120px"
                 onerror="handleAvatarError(this)">
            <span id="unread-badge" class="unread-badge" style="display:none">0</span>
          </div>
          <div class="name">林小梦</div>
          <div class="status-text" id="status-text">正在连接...</div>
        </div>

        <div class="relationship-section">
          <div class="level-name" id="level-name"></div>
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="progress-info" id="progress-info"></div>
        </div>

        <div class="action-section">
          <button class="btn-primary chat-btn" onclick="location.href='/pages/chat.html'">进入聊天</button>
          <div class="sub-actions">
            <button class="btn-secondary" onclick="location.href='/pages/memory.html'">我的记忆</button>
            <button class="btn-secondary" onclick="location.href='/pages/diary.html'">她的日记</button>
            <button class="btn-secondary" onclick="goToRelationship()">关系状态</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    checkLogin()

    const LEVEL_NAMES = ['陌生人', '朋友', '亲密', '知己']
    const LEVEL_LABELS = ['我们还不太熟', '我们是朋友', '我们很亲密', '你是我的知己']
    const LEVEL_THRESHOLDS = [200, 800, 2000, Infinity]

    function handleAvatarError(img) {
      img.onerror = null
      img.style.display = 'none'
      const wrapper = img.parentElement
      if (wrapper && !wrapper.querySelector('.avatar-fallback')) {
        const fallback = document.createElement('div')
        fallback.className = 'avatar-fallback'
        fallback.style.cssText = 'width:120px;height:120px;font-size:36px'
        fallback.textContent = '梦'
        wrapper.appendChild(fallback)
      }
    }

    async function loadPage() {
      try {
        const [relRes, unreadRes] = await Promise.all([
          request('GET', '/api/relationship/status'),
          request('GET', '/api/agent/unread-count')
        ])

        // 用户名首字
        const username = localStorage.getItem('username') || ''
        if (username) {
          document.getElementById('user-initial').textContent = username.charAt(0).toUpperCase()
        }

        // 关系状态
        if (relRes.code === 0 && relRes.data) {
          const d = relRes.data
          const level = d.level || 0

          document.getElementById('status-text').textContent = d.status_text || '和你在一起的每一天都很开心'
          document.getElementById('level-name').textContent = LEVEL_LABELS[level] || LEVEL_LABELS[0]

          const currentGrowth = d.current_growth || 0
          const nextThreshold = LEVEL_THRESHOLDS[level] || 200
          const percent = d.progress_percent || Math.min(100, Math.round(currentGrowth / nextThreshold * 100))

          document.getElementById('progress-info').textContent = currentGrowth + ' / ' + nextThreshold

          // 缓存关系等级供其他页面使用
          localStorage.setItem('relationship_level', level)

          // 延迟触发进度条动画
          setTimeout(() => {
            document.getElementById('progress-fill').style.width = percent + '%'
          }, 100)

          // 头像情绪
          if (d.ai_current_emotion) {
            updateAvatarEmotion(d.ai_current_emotion)
          }
        }

        // 未读数
        if (unreadRes.code === 0) {
          const count = unreadRes.data?.count || 0
          const badge = document.getElementById('unread-badge')
          if (count > 0) {
            badge.textContent = formatBadgeCount(count)
            badge.style.display = 'block'
          } else {
            badge.style.display = 'none'
          }
        }

        // 切换到真实内容
        document.getElementById('main-content').classList.add('content-loaded')

      } catch (err) {
        console.error('页面加载失败:', err)
        document.getElementById('main-content').classList.add('content-loaded')
        showToast('加载失败，请刷新重试', 'error')
      }
    }

    loadPage()
  </script>
</body>
</html>
