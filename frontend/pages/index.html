<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>林小梦</title>
  <link rel="stylesheet" href="/static/css/common.css">
  <link rel="stylesheet" href="/static/css/h5-theme.css">
  <style>
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 顶部栏 */
    .top-bar .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text);
    }

    .top-bar .settings-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .top-bar .settings-btn:active {
      background: rgba(0, 0, 0, 0.05);
    }

    /* 核心内容区 */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px 24px;
    }

    /* 头像区 */
    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
    }

    .avatar-section .avatar-wrapper {
      margin-bottom: 12px;
    }

    .avatar-section .name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    /* 状态语文语气泡（漫画描边 + 下三角） */
    .home-status-bubble {
      position: relative;
      max-width: 280px;
      margin: 0 auto;
      padding: 12px 16px 14px;
      background: #fff;
      border: 4px solid #121212;
      border-radius: 18px;
      box-shadow: 5px 5px 0 rgba(18, 18, 18, 0.18);
    }

    .home-status-bubble::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: -10px;
      margin-left: -10px;
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 10px solid #121212;
    }

    .home-status-bubble::before {
      content: '';
      position: absolute;
      left: 50%;
      bottom: -5px;
      margin-left: -7px;
      width: 0;
      height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 7px solid #fff;
      z-index: 1;
    }

    .avatar-section .status-text {
      margin: 0;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.45;
      color: #111;
      text-align: center;
    }

    /* 进入聊天外包一层：未读角标锚点 */
    .home-chat-btn-wrap {
      position: relative;
      width: 100%;
      margin-bottom: 12px;
    }

    .home-chat-btn-wrap .chat-btn {
      margin-bottom: 0;
    }

    /* 首页未读：红底 + 黑细描边 + 压按钮角（覆盖 common 中头像角标定位）；呼吸仅在有未读时加类 .unread-badge--active */
    .home-chat-btn-wrap .unread-badge {
      top: -8px;
      right: -4px;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      font-size: 12px;
      font-weight: 800;
      line-height: 22px;
      border-radius: 999px;
      background: #ef4444;
      color: #fff;
      border: 2px solid #121212;
      box-sizing: border-box;
      transform-origin: 50% 50%;
    }

    .home-chat-btn-wrap .unread-badge.unread-badge--active {
      animation: home-unread-breathe 2.2s ease-in-out infinite;
    }

    @keyframes home-unread-breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.14); }
    }

    @media (prefers-reduced-motion: reduce) {
      .home-chat-btn-wrap .unread-badge.unread-badge--active {
        animation: none !important;
      }
    }

    .chat-btn .home-btn-icon {
      flex-shrink: 0;
    }

    /* 关系区域 */
    .relationship-section {
      width: 100%;
      max-width: 320px;
      text-align: center;
      margin-bottom: 32px;
    }

    .relationship-section .level-name {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 12px;
      color: var(--color-text);
    }

    .relationship-section .progress-info {
      font-size: 12px;
      color: var(--color-gray);
      margin-top: 8px;
    }

    /* 按钮区域 */
    .action-section {
      width: 100%;
      max-width: 320px;
      margin-top: auto;
      padding-bottom: calc(24px + var(--safe-area-bottom));
    }

    .chat-btn {
      width: 100%;
      height: 52px;
      font-size: 18px;
      border-radius: 12px;
      margin-bottom: 12px;
      gap: 10px;
    }

    .sub-actions {
      display: flex;
      gap: 8px;
    }

    .sub-actions .btn-secondary {
      flex: 1;
      flex-direction: row;
      gap: 6px;
      font-size: 12px;
      padding: 8px 4px;
      min-height: 48px;
    }

    .sub-actions .btn-secondary .home-btn-icon {
      flex-shrink: 0;
    }

    /* 骨架屏 */
    .skeleton-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
    }

    .skeleton-text {
      height: 16px;
      width: 80px;
      margin: 8px auto;
    }

    .skeleton-text-long {
      height: 14px;
      width: 140px;
      margin: 6px auto;
    }

    .skeleton-progress {
      height: 22px;
      width: 100%;
      margin: 16px auto 0;
      border-radius: 999px;
    }

    .content-loaded .skeleton-wrap { display: none; }
    .content-loaded .real-content { display: flex !important; }
    .real-content { display: none !important; }
  </style>
</head>
<body class="h5-skin">
  <div class="h5-home-decor" aria-hidden="true"></div>
  <div class="page">
    <!-- 顶部栏 -->
    <div class="top-bar">
      <div class="bar-left">
        <div class="user-avatar" id="user-initial">-</div>
      </div>
      <div class="bar-center"></div>
      <div class="bar-right">
        <button class="settings-btn" onclick="location.href='/pages/settings.html'">⚙️</button>
      </div>
    </div>

    <div class="main-content h5-home-main" id="main-content">
      <!-- 骨架屏 -->
      <div class="skeleton-wrap">
        <div class="avatar-section">
          <div class="skeleton skeleton-avatar"></div>
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-text-long"></div>
        </div>
        <div class="relationship-section">
          <div class="skeleton skeleton-text" style="width:120px"></div>
          <div class="skeleton skeleton-progress"></div>
        </div>
      </div>

      <!-- 真实内容 -->
      <div class="real-content" style="flex-direction:column;align-items:center;width:100%;flex:1">
        <div class="avatar-section">
          <div class="avatar-wrapper" style="width:120px;height:120px">
            <img id="linxiaomeng-avatar"
                 src="/static/images/avatar/default.png"
                 alt="林小梦"
                 style="width:120px;height:120px"
                 onerror="handleAvatarError(this)">
          </div>
          <div class="name">林小梦</div>
          <div class="home-status-bubble" aria-live="polite">
            <p class="status-text" id="status-text">正在连接...</p>
          </div>
        </div>

        <div class="relationship-section">
          <div class="level-name" id="level-name"></div>
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="progress-info" id="progress-info"></div>
        </div>

        <div class="action-section">
          <div class="home-chat-btn-wrap">
            <button class="btn-primary chat-btn" type="button" onclick="location.href='/pages/chat.html'">
              <svg class="home-btn-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M5 5.5h14a1.5 1.5 0 0 1 1.5 1.5v7.5a1.5 1.5 0 0 1-1.5 1.5h-4.2L9 20.5v-4H5A1.5 1.5 0 0 1 3.5 14.5V7A1.5 1.5 0 0 1 5 5.5z" stroke="#fff" stroke-width="2" stroke-linejoin="round"/>
              </svg>
              <span>进入聊天</span>
            </button>
            <span id="unread-badge" class="unread-badge" style="display:none" aria-label="未读主动消息">0</span>
          </div>
          <div class="sub-actions">
            <button class="btn-secondary" type="button" onclick="location.href='/pages/memory.html'">
              <svg class="home-btn-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M12 20.5s-6.5-4.2-6.5-10.2A4.5 4.5 0 0 1 12 5.8a4.5 4.5 0 0 1 6.5 4.5c0 6-6.5 10.2-6.5 10.2z" stroke="#ec4899" stroke-width="2" stroke-linejoin="round"/>
              </svg>
              <span>我的记忆</span>
            </button>
            <button class="btn-secondary" type="button" onclick="location.href='/pages/diary.html'">
              <svg class="home-btn-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect x="5" y="3" width="14" height="18" rx="2" stroke="#9333ea" stroke-width="2"/>
                <path d="M8 7h8M8 11h5" stroke="#9333ea" stroke-width="2" stroke-linecap="round"/>
                <path d="M15.2 15.3c.2.8-.4 1.5-1.2 1.7-.8.2-1.5-.4-1.7-1.2-.1-.4-.5-.7-.9-.7h-.4" stroke="#db2777" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
              <span>她的日记</span>
            </button>
            <button class="btn-secondary" type="button" onclick="goToRelationship()">
              <svg class="home-btn-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect x="4" y="5" width="16" height="15" rx="2" stroke="#3b82f6" stroke-width="2"/>
                <path d="M4 9h16M8 5V3M16 5V3" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <span>关系状态</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    checkLogin()

    const LEVEL_NAMES = ['陌生人', '朋友', '亲密', '知己']
    const LEVEL_LABELS = ['我们还不太熟', '我们是朋友', '我们很亲密', '你是我的知己']
    const LEVEL_THRESHOLDS = [200, 800, 2000, Infinity]

    function handleAvatarError(img) {
      img.onerror = null
      img.style.display = 'none'
      const wrapper = img.parentElement
      if (wrapper && !wrapper.querySelector('.avatar-fallback')) {
        const fallback = document.createElement('div')
        fallback.className = 'avatar-fallback'
        fallback.style.cssText = 'width:120px;height:120px;font-size:36px'
        fallback.textContent = '梦'
        wrapper.appendChild(fallback)
      }
    }

    async function loadPage() {
      try {
        const [relRes, unreadRes] = await Promise.all([
          request('GET', '/api/relationship/status'),
          request('GET', '/api/agent/unread-count')
        ])

        // 用户名首字
        const username = localStorage.getItem('username') || ''
        if (username) {
          document.getElementById('user-initial').textContent = username.charAt(0).toUpperCase()
        }

        // 关系状态
        if (relRes.code === 0 && relRes.data) {
          const d = relRes.data
          const level = d.level || 0

          document.getElementById('status-text').textContent = d.status_text || '和你在一起的每一天都很开心'
          document.getElementById('level-name').textContent = LEVEL_LABELS[level] || LEVEL_LABELS[0]

          const currentGrowth = d.current_growth || 0
          const nextThreshold = LEVEL_THRESHOLDS[level] || 200
          const percent = d.progress_percent || Math.min(100, Math.round(currentGrowth / nextThreshold * 100))

          document.getElementById('progress-info').textContent = currentGrowth + ' / ' + nextThreshold

          // 缓存关系等级供其他页面使用
          localStorage.setItem('relationship_level', level)

          // 延迟触发进度条动画
          setTimeout(() => {
            document.getElementById('progress-fill').style.width = percent + '%'
          }, 100)

          // 头像情绪
          if (d.ai_current_emotion) {
            updateAvatarEmotion(d.ai_current_emotion)
          }
        }

        // 未读数（角标与呼吸动效仅在 count>0 时展示）
        if (unreadRes.code === 0) {
          const count = unreadRes.data?.count || 0
          const badge = document.getElementById('unread-badge')
          if (count > 0) {
            badge.textContent = formatBadgeCount(count)
            badge.style.display = 'block'
            badge.classList.add('unread-badge--active')
          } else {
            badge.style.display = 'none'
            badge.classList.remove('unread-badge--active')
          }
        }

        // 切换到真实内容
        document.getElementById('main-content').classList.add('content-loaded')

      } catch (err) {
        console.error('页面加载失败:', err)
        document.getElementById('main-content').classList.add('content-loaded')
        showToast('加载失败，请刷新重试', 'error')
      }
    }

    loadPage()
  </script>
</body>
</html>
