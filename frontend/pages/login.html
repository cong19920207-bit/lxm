<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>林小梦 - 登录</title>
  <link rel="stylesheet" href="/static/css/common.css">
  <link rel="stylesheet" href="/static/css/h5-theme.css">
  <style>
    .h5-auth-wrap .brand {
      text-align: center;
      margin-bottom: 1.25rem;
    }

    .form-container {
      width: 100%;
      max-width: 100%;
    }

    .form-panel {
      display: none;
    }

    .form-panel.active {
      display: block;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: var(--color-gray);
      margin-bottom: 6px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .input-field {
      padding-right: 44px;
    }

    .toggle-pwd {
      position: absolute;
      right: 0;
      top: 0;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-gray);
      font-size: 18px;
      cursor: pointer;
      user-select: none;
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--color-gray);
    }

    .remember-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--color-primary);
    }

    .submit-btn {
      width: 100%;
      height: 48px;
      font-size: 16px;
    }

    .switch-links {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--color-gray);
    }

    .switch-links a {
      color: #E8938A;
      cursor: pointer;
      margin: 0 6px;
    }
  </style>
</head>
<body class="h5-skin">
  <div class="h5-auth-wrap">
    <div class="h5-auth-decor" aria-hidden="true"><div class="h5-auth-spark"></div></div>
    <div class="h5-auth-inner">
      <div class="brand">
        <h1 class="h5-brand-title">林小梦</h1>
        <p class="h5-brand-sub">你专属的数字人格陪伴</p>
      </div>

      <div class="form-container h5-auth-card">
    <!-- 登录表单 -->
    <div class="form-panel active" id="panel-login">
      <div class="form-group">
        <label>账号</label>
        <input class="input-field" id="login-username" type="text" placeholder="请输入账号" maxlength="20">
        <div class="field-error" id="login-username-error"></div>
      </div>
      <div class="form-group">
        <label>密码</label>
        <div class="input-wrapper">
          <input class="input-field" id="login-password" type="password" placeholder="请输入密码" maxlength="20">
          <span class="toggle-pwd" onclick="togglePassword('login-password', this)">👁</span>
        </div>
        <div class="field-error" id="login-password-error"></div>
      </div>
      <div class="remember-row">
        <input type="checkbox" id="remember-me">
        <label for="remember-me">记住我</label>
      </div>
      <button class="btn-primary submit-btn disabled" id="btn-login" onclick="handleLogin()">登录</button>
      <div class="switch-links">
        <a onclick="switchPanel('register')">注册账号</a>
        <span>|</span>
        <a onclick="switchPanel('reset')">找回密码</a>
      </div>
    </div>

    <!-- 注册表单 -->
    <div class="form-panel" id="panel-register">
      <div class="form-group">
        <label>账号</label>
        <input class="input-field" id="reg-username" type="text" placeholder="6-20位字母数字" maxlength="20">
        <div class="field-error" id="reg-username-error"></div>
      </div>
      <div class="form-group">
        <label>密码</label>
        <div class="input-wrapper">
          <input class="input-field" id="reg-password" type="password" placeholder="8-20位，含字母和数字" maxlength="20">
          <span class="toggle-pwd" onclick="togglePassword('reg-password', this)">👁</span>
        </div>
        <div class="field-error" id="reg-password-error"></div>
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <div class="input-wrapper">
          <input class="input-field" id="reg-password2" type="password" placeholder="请再次输入密码" maxlength="20">
          <span class="toggle-pwd" onclick="togglePassword('reg-password2', this)">👁</span>
        </div>
        <div class="field-error" id="reg-password2-error"></div>
      </div>
      <button class="btn-primary submit-btn disabled" id="btn-register" onclick="handleRegister()">注册</button>
      <div class="switch-links">
        <a onclick="switchPanel('login')">返回登录</a>
      </div>
    </div>

    <!-- 找回密码表单 -->
    <div class="form-panel" id="panel-reset">
      <div class="form-group">
        <label>账号</label>
        <input class="input-field" id="reset-username" type="text" placeholder="请输入账号" maxlength="20">
        <div class="field-error" id="reset-username-error"></div>
      </div>
      <div class="form-group">
        <label>新密码</label>
        <div class="input-wrapper">
          <input class="input-field" id="reset-password" type="password" placeholder="8-20位，含字母和数字" maxlength="20">
          <span class="toggle-pwd" onclick="togglePassword('reset-password', this)">👁</span>
        </div>
        <div class="field-error" id="reset-password-error"></div>
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <div class="input-wrapper">
          <input class="input-field" id="reset-password2" type="password" placeholder="请再次输入密码" maxlength="20">
          <span class="toggle-pwd" onclick="togglePassword('reset-password2', this)">👁</span>
        </div>
        <div class="field-error" id="reset-password2-error"></div>
      </div>
      <button class="btn-primary submit-btn disabled" id="btn-reset" onclick="handleReset()">重置密码</button>
      <div class="switch-links">
        <a onclick="switchPanel('login')">返回登录</a>
      </div>
    </div>
      </div>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    /* ====== 表单切换 ====== */
    function switchPanel(name) {
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'))
      document.getElementById('panel-' + name).classList.add('active')
      clearAllErrors()
    }

    /* ====== 密码显示/隐藏 ====== */
    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId)
      if (input.type === 'password') {
        input.type = 'text'
        icon.textContent = '🙈'
      } else {
        input.type = 'password'
        icon.textContent = '👁'
      }
    }

    /* ====== 校验规则 ====== */
    const RULES = {
      username: { pattern: /^[a-zA-Z0-9]{6,20}$/, msg: '账号需要6-20位字母或数字' },
      password: { pattern: /^(?=.*[a-zA-Z])(?=.*\d)[a-zA-Z0-9!@#$%^&*]{8,20}$/, msg: '密码需要8-20位，同时包含字母和数字' }
    }

    function validateField(inputId, ruleName, errorId) {
      const input = document.getElementById(inputId)
      const value = input.value.trim()
      const rule = RULES[ruleName]
      const errorEl = document.getElementById(errorId)

      if (!value) {
        setError(input, errorEl, '')
        return false
      }

      if (!rule.pattern.test(value)) {
        setError(input, errorEl, rule.msg)
        return false
      }

      clearError(input, errorEl)
      return true
    }

    function validateConfirmPassword(pwdId, confirmId, errorId) {
      const pwd = document.getElementById(pwdId).value
      const confirm = document.getElementById(confirmId).value
      const input = document.getElementById(confirmId)
      const errorEl = document.getElementById(errorId)

      if (!confirm) {
        setError(input, errorEl, '')
        return false
      }

      if (pwd !== confirm) {
        setError(input, errorEl, '两次密码不一致')
        return false
      }

      clearError(input, errorEl)
      return true
    }

    function setError(input, errorEl, msg) {
      input.classList.add('error')
      errorEl.textContent = msg
      errorEl.classList.toggle('visible', !!msg)
    }

    function clearError(input, errorEl) {
      input.classList.remove('error')
      errorEl.classList.remove('visible')
      errorEl.textContent = ''
    }

    function clearAllErrors() {
      document.querySelectorAll('.input-field').forEach(i => i.classList.remove('error'))
      document.querySelectorAll('.field-error').forEach(e => {
        e.classList.remove('visible')
        e.textContent = ''
      })
    }

    /* ====== 登录表单校验 ====== */
    function checkLoginForm() {
      const u = document.getElementById('login-username').value.trim()
      const p = document.getElementById('login-password').value
      const btn = document.getElementById('btn-login')
      const uOk = RULES.username.pattern.test(u)
      const pOk = RULES.password.pattern.test(p)
      btn.classList.toggle('disabled', !(uOk && pOk))
    }

    function checkRegisterForm() {
      const u = document.getElementById('reg-username').value.trim()
      const p = document.getElementById('reg-password').value
      const p2 = document.getElementById('reg-password2').value
      const btn = document.getElementById('btn-register')
      const ok = RULES.username.pattern.test(u) && RULES.password.pattern.test(p) && p === p2
      btn.classList.toggle('disabled', !ok)
    }

    function checkResetForm() {
      const u = document.getElementById('reset-username').value.trim()
      const p = document.getElementById('reset-password').value
      const p2 = document.getElementById('reset-password2').value
      const btn = document.getElementById('btn-reset')
      const ok = RULES.username.pattern.test(u) && RULES.password.pattern.test(p) && p === p2
      btn.classList.toggle('disabled', !ok)
    }

    /* ====== 输入事件绑定 ====== */
    ;['login-username', 'login-password'].forEach(id => {
      const el = document.getElementById(id)
      el.addEventListener('input', checkLoginForm)
      el.addEventListener('blur', () => {
        if (id === 'login-username') validateField(id, 'username', id + '-error')
        else validateField(id, 'password', id + '-error')
      })
    })

    ;['reg-username', 'reg-password', 'reg-password2'].forEach(id => {
      const el = document.getElementById(id)
      el.addEventListener('input', checkRegisterForm)
      el.addEventListener('blur', () => {
        if (id === 'reg-username') validateField(id, 'username', id + '-error')
        else if (id === 'reg-password') validateField(id, 'password', id + '-error')
        else validateConfirmPassword('reg-password', 'reg-password2', id + '-error')
      })
    })

    ;['reset-username', 'reset-password', 'reset-password2'].forEach(id => {
      const el = document.getElementById(id)
      el.addEventListener('input', checkResetForm)
      el.addEventListener('blur', () => {
        if (id === 'reset-username') validateField(id, 'username', id + '-error')
        else if (id === 'reset-password') validateField(id, 'password', id + '-error')
        else validateConfirmPassword('reset-password', 'reset-password2', id + '-error')
      })
    })

    /* ====== 提交处理 ====== */
    let submitting = false

    async function handleLogin() {
      if (submitting) return
      const btn = document.getElementById('btn-login')
      if (btn.classList.contains('disabled')) return

      submitting = true
      btn.textContent = '登录中...'
      btn.classList.add('disabled')

      const username = document.getElementById('login-username').value.trim()
      const password = document.getElementById('login-password').value

      const res = await request('POST', '/api/auth/login', { username, password })

      if (res.code === 0) {
        saveToken(res.data.token)
        if (document.getElementById('remember-me').checked) {
          localStorage.setItem('remember_username', username)
        } else {
          localStorage.removeItem('remember_username')
        }
        window.location.href = '/pages/index.html'
      } else {
        let msg = res.message || '登录失败'
        if (res.data && res.data.remaining_seconds) {
          const minutes = Math.ceil(res.data.remaining_seconds / 60)
          msg = '密码错误次数过多，请' + minutes + '分钟后重试'
        }
        showToast(msg, 'error')
        btn.textContent = '登录'
        btn.classList.remove('disabled')
        checkLoginForm()
      }

      submitting = false
    }

    async function handleRegister() {
      if (submitting) return
      const btn = document.getElementById('btn-register')
      if (btn.classList.contains('disabled')) return

      submitting = true
      btn.textContent = '注册中...'
      btn.classList.add('disabled')

      const username = document.getElementById('reg-username').value.trim()
      const password = document.getElementById('reg-password').value
      const confirm_password = document.getElementById('reg-password2').value

      const res = await request('POST', '/api/auth/register', { username, password, confirm_password })

      if (res.code === 0) {
        showToast('注册成功，请登录', 'success')
        switchPanel('login')
        document.getElementById('login-username').value = username
        checkLoginForm()
      } else {
        showToast(res.message || '注册失败', 'error')
      }

      btn.textContent = '注册'
      btn.classList.remove('disabled')
      checkRegisterForm()
      submitting = false
    }

    async function handleReset() {
      if (submitting) return
      const btn = document.getElementById('btn-reset')
      if (btn.classList.contains('disabled')) return

      submitting = true
      btn.textContent = '重置中...'
      btn.classList.add('disabled')

      const username = document.getElementById('reset-username').value.trim()
      const new_password = document.getElementById('reset-password').value
      const confirm_password = document.getElementById('reset-password2').value

      const res = await request('POST', '/api/auth/reset-password', { username, new_password, confirm_password })

      if (res.code === 0) {
        showToast('密码重置成功，请登录', 'success')
        switchPanel('login')
        document.getElementById('login-username').value = username
        checkLoginForm()
      } else {
        showToast(res.message || '重置失败', 'error')
      }

      btn.textContent = '重置密码'
      btn.classList.remove('disabled')
      checkResetForm()
      submitting = false
    }

    /* ====== 初始化 ====== */
    ;(function init() {
      const remembered = localStorage.getItem('remember_username')
      if (remembered) {
        document.getElementById('login-username').value = remembered
        document.getElementById('remember-me').checked = true
        checkLoginForm()
      }
    })()
  </script>
</body>
</html>
