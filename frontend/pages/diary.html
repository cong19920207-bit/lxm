<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>林小梦 - 日记</title>
  <link rel="stylesheet" href="/static/css/common.css">
  <link rel="stylesheet" href="/static/css/h5-theme.css">
  <style>
    /* 日记页独立视觉：淡紫底，不沿用全站 neo 卡片 */
    html:has(> body.diary-page),
    body.h5-skin.diary-page {
      background: #f3f0ff;
      background-attachment: scroll;
    }

    .diary-page-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f3f0ff;
    }

    /* Hero 头图 */
    .diary-hero {
      position: relative;
      flex-shrink: 0;
      height: 45vh;
      min-height: 200px;
      max-height: 420px;
      background-color: #e9e4f8;
      background-image: url('/static/images/diary/dary_ri.png');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
    }

    .diary-hero::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 40%;
      background: linear-gradient(180deg, rgba(243, 240, 255, 0) 0%, rgba(243, 240, 255, 0.88) 70%, #f3f0ff 100%);
      pointer-events: none;
    }

    /* 返回钮：位置/尺寸对齐 chat-top-bar，视觉为淡薰衣草紫 */
    .diary-hero-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 4;
      box-sizing: border-box;
      padding: calc(env(safe-area-inset-top, 0px) + 8px) 12px 10px;
      display: flex;
      align-items: center;
    }

    .diary-hero-bar .back-btn {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      border: none;
      border-radius: 18px;
      background: rgba(184, 168, 240, 0.45);
      color: rgba(255, 255, 255, 0.82);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.32),
        0 0 8px rgba(184, 168, 240, 0.2);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
    }

    .diary-hero-bar .back-btn svg {
      display: block;
      width: 18px;
      height: 18px;
    }

    .diary-hero-bar .back-btn:active {
      background: rgba(184, 168, 240, 0.58);
      transform: scale(0.96);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.38),
        0 0 10px rgba(184, 168, 240, 0.28);
    }

    /* 列表与头图渐变叠压（相对原上提位置下移 60px） */
    .diary-main {
      flex: 1;
      margin-top: calc(-17vh + 60px);
      position: relative;
      z-index: 3;
      padding: 0 16px calc(16px + var(--safe-area-bottom));
    }

    @media (max-height: 640px) {
      .diary-main {
        margin-top: -40px;
      }
    }

    #diary-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .diary-card {
      display: flex;
      gap: 14px;
      padding: 18px 16px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 4px 24px rgba(148, 137, 179, 0.1);
      position: relative;
      cursor: pointer;
      transition: box-shadow 0.25s ease, transform 0.2s ease;
      border: 1px solid transparent;
    }

    .diary-card:active {
      transform: scale(0.995);
    }

    .diary-card.unread {
      border-color: rgba(167, 139, 250, 0.45);
      box-shadow: 0 4px 28px rgba(167, 139, 250, 0.16);
      border-left: 2px solid #a78bfa;
    }

    .diary-card .unread-dot {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #a78bfa;
      transition: opacity 0.3s;
    }

    .diary-card.read .unread-dot {
      opacity: 0;
      pointer-events: none;
    }

    .diary-card-date {
      flex: 0 0 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      color: #9489b3;
    }

    .diary-card-month {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .diary-card-day {
      font-size: 28px;
      font-weight: 700;
      color: #333;
      line-height: 1;
      margin-bottom: 2px;
    }

    .diary-card-weekday {
      font-size: 12px;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .diary-card-icon {
      width: 22px;
      height: 22px;
      color: #b8a9d4;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .diary-card-icon svg {
      width: 20px;
      height: 20px;
      display: block;
    }

    .diary-card-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .diary-card-content {
      font-size: 14px;
      line-height: 1.75;
      color: #444;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      word-break: break-word;
      transition: -webkit-line-clamp 0.25s ease;
    }

    .diary-card.expanded .diary-card-content {
      -webkit-line-clamp: unset;
      display: block;
    }

    .diary-card-more {
      align-self: flex-end;
      margin-top: 10px;
      font-size: 13px;
      color: #9489b3;
      letter-spacing: 0.02em;
    }

    /* 空态 / 底部分页提示换肤 */
    body.diary-page .empty-state .empty-bubble {
      background: rgba(167, 139, 250, 0.55);
    }

    body.diary-page .empty-state .empty-dot {
      background: rgba(196, 181, 253, 0.9);
    }

    body.diary-page .empty-state .empty-dot:nth-child(4) {
      background: rgba(167, 139, 250, 0.75);
    }

    body.diary-page .empty-state .empty-text {
      color: #7c7394;
    }

    body.diary-page .btn-primary:not(.send-btn) {
      background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
      border: none;
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.28);
      font-weight: 600;
    }

    body.diary-page .btn-primary:not(.send-btn):active {
      transform: scale(0.98);
      box-shadow: 0 4px 14px rgba(139, 92, 246, 0.22);
    }

    body.diary-page .no-more-text {
      color: #9489b3;
    }
  </style>
</head>
<body class="h5-skin diary-page">
  <div class="diary-page-wrap">
    <header class="diary-hero" role="banner">
      <div class="diary-hero-bar">
        <button type="button" class="back-btn" onclick="history.back()" aria-label="返回">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M14 7L9 12l5 5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="diary-main">
      <div id="diary-list"></div>
      <div class="load-more-sentinel" id="bottom-sentinel"></div>
      <div class="no-more-text" id="no-more" style="display:none">没有更多日记了</div>

      <div class="empty-state" id="empty-active" style="display:none">
        <div class="empty-icon">
          <div class="empty-bubble"></div>
          <div class="empty-dot"></div>
          <div class="empty-dot"></div>
          <div class="empty-dot"></div>
        </div>
        <div class="empty-text">今天林小梦还没写新日记哦<br>多和我聊聊吧</div>
        <button class="btn-primary" type="button" onclick="location.href='/pages/chat.html'">去聊天</button>
      </div>

      <div class="empty-state" id="empty-new" style="display:none">
        <div class="empty-icon">
          <div class="empty-bubble"></div>
          <div class="empty-dot"></div>
          <div class="empty-dot"></div>
          <div class="empty-dot"></div>
        </div>
        <div class="empty-text">和我多聊聊天<br>我会把我们的故事都记下来</div>
      </div>

      <div class="empty-state" id="empty-error" style="display:none">
        <div class="empty-text" id="empty-error-text">日记加载失败，请检查网络后重试</div>
        <button type="button" class="btn-primary" id="btn-retry-diary">重新加载</button>
      </div>
    </main>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    checkLogin()

    var MONTH_EN = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC']
    var WEEKDAY_ZH = ['周日', '周一', '周二', '周三', '周四', '周五', '周六']

    var currentPage = 1
    var loading = false
    var noMore = false
    var totalLoaded = 0
    var relationLevel = parseInt(localStorage.getItem('relationship_level') || '0', 10) || 0

    function hideAllEmptyStates() {
      document.getElementById('empty-active').style.display = 'none'
      document.getElementById('empty-new').style.display = 'none'
      document.getElementById('empty-error').style.display = 'none'
    }

    /* 列表日期：优先北京覆盖日，旧数据无字段时回退 created_at */
    function parseDiaryDateParts(diary) {
      var y, m, d
      if (diary.covers_beijing_date) {
        var p = String(diary.covers_beijing_date).split('-')
        if (p.length === 3) {
          y = parseInt(p[0], 10)
          m = parseInt(p[1], 10)
          d = parseInt(p[2], 10)
        }
      }
      if ((!y || isNaN(m) || isNaN(d)) && diary.created_at) {
        var dt = new Date(diary.created_at)
        y = dt.getFullYear()
        m = dt.getMonth() + 1
        d = dt.getDate()
      }
      if (!y || isNaN(m) || isNaN(d)) {
        return { monthEn: '', day: '—', weekdayZh: '', iconIndex: 0 }
      }
      var dateObj = new Date(y, m - 1, d)
      return {
        monthEn: MONTH_EN[m - 1] || '',
        day: String(d),
        weekdayZh: WEEKDAY_ZH[dateObj.getDay()],
        iconIndex: dateObj.getDay() % 4
      }
    }

    function getDiaryDecorIcon(iconIndex) {
      var icons = [
        '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M19 14.5A7.5 7.5 0 0 1 5 12.8 5.5 5.5 0 1 1 12.2 5 6.5 6.5 0 0 1 19 14.5Z" stroke="currentColor" stroke-width="1.6"/></svg>',
        '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 18h10a4 4 0 0 0 .2-8 5.5 5.5 0 0 0-10.6-1.2A4 4 0 0 0 7 18Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>',
        '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.6"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4l1.4-1.4M17 7l1.4-1.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>',
        '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3.5l1.4 4.3h4.5l-3.6 2.6 1.4 4.3L12 12.1 8.3 14.7l1.4-4.3-3.6-2.6h4.5L12 3.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>'
      ]
      return icons[iconIndex % 4] || icons[0]
    }

    async function loadDiaries(page) {
      if (loading || noMore) return
      loading = true

      const res = await request('GET', '/api/diary/list?page=' + page)
      if (!res || res.code !== 0 || !res.data) {
        loading = false
        if (page === 1) {
          showToast((res && res.message) || '日记列表加载失败，请稍后重试', 'error')
          hideAllEmptyStates()
          const errEl = document.getElementById('empty-error')
          const errText = document.getElementById('empty-error-text')
          if (errText) errText.textContent = (res && res.message) || '日记加载失败，请检查网络后重试'
          errEl.style.display = 'flex'
        }
        return
      }

      const data = res.data
      const items = Array.isArray(data.items) ? data.items : []
      const pageSize = typeof data.page_size === 'number' && data.page_size > 0 ? data.page_size : 20
      const total = data.total

      if (page === 1) {
        hideAllEmptyStates()
      }

      if (items.length === 0 && page === 1) {
        noMore = true
        showEmptyState()
        loading = false
        return
      }

      if (items.length === 0 && page > 1) {
        noMore = true
        loading = false
        return
      }

      if (items.length > 0) {
        const totalIsNum = typeof total === 'number' && !isNaN(total)
        if (totalIsNum) {
          if (totalLoaded + items.length >= total) {
            noMore = true
            document.getElementById('no-more').style.display = 'block'
          }
        } else if (items.length < pageSize) {
          noMore = true
          if (totalLoaded + items.length > 0) {
            document.getElementById('no-more').style.display = 'block'
          }
        }

        items.forEach(function (d) { appendDiaryCard(d) })
        totalLoaded += items.length
        currentPage = page
      }

      loading = false
    }

    function showEmptyState() {
      hideAllEmptyStates()
      if (relationLevel >= 1) {
        document.getElementById('empty-active').style.display = 'flex'
      } else {
        document.getElementById('empty-new').style.display = 'flex'
      }
    }

    function appendDiaryCard(diary) {
      const list = document.getElementById('diary-list')
      const card = document.createElement('div')
      const parts = parseDiaryDateParts(diary)
      card.className = 'diary-card' + (diary.is_read ? '' : ' unread')
      card.dataset.id = diary.id

      card.innerHTML =
        (diary.is_read ? '' : '<div class="unread-dot" aria-hidden="true"></div>') +
        '<div class="diary-card-date">' +
          '<div class="diary-card-month">' + escapeHtml(parts.monthEn) + '</div>' +
          '<div class="diary-card-day">' + escapeHtml(parts.day) + '</div>' +
          '<div class="diary-card-weekday">' + escapeHtml(parts.weekdayZh) + '</div>' +
          '<div class="diary-card-icon">' + getDiaryDecorIcon(parts.iconIndex) + '</div>' +
        '</div>' +
        '<div class="diary-card-body">' +
          '<div class="diary-card-content">' + escapeHtml(diary.content) + '</div>' +
          '<span class="diary-card-more">继续看 &gt;</span>' +
        '</div>'

      card.addEventListener('click', function () {
        toggleDiary(card, diary)
      })

      list.appendChild(card)
    }

    function escapeHtml(text) {
      const div = document.createElement('div')
      div.textContent = text == null ? '' : String(text)
      return div.innerHTML
    }

    async function toggleDiary(card, diary) {
      const isExpanded = card.classList.contains('expanded')
      const moreEl = card.querySelector('.diary-card-more')

      if (isExpanded) {
        card.classList.remove('expanded')
        if (moreEl) moreEl.textContent = '继续看 >'
      } else {
        card.classList.add('expanded')
        if (moreEl) moreEl.textContent = '收起'

        if (card.classList.contains('unread')) {
          card.classList.remove('unread')
          card.classList.add('read')
          request('POST', '/api/diary/' + diary.id + '/read')
        }
      }
    }

    const observer = new IntersectionObserver(function (entries) {
      if (entries[0].isIntersecting && !loading && !noMore) {
        loadDiaries(currentPage + 1)
      }
    })
    observer.observe(document.getElementById('bottom-sentinel'))

    async function initDiary() {
      const diaryPromise = loadDiaries(1)
      request('GET', '/api/relationship/status').then(function (relRes) {
        if (relRes && relRes.code === 0 && relRes.data) {
          relationLevel = relRes.data.level || 0
          localStorage.setItem('relationship_level', String(relationLevel))
          var list = document.getElementById('diary-list')
          if (list && list.children.length === 0) {
            var ea = document.getElementById('empty-active')
            var en = document.getElementById('empty-new')
            if ((ea && ea.style.display === 'flex') || (en && en.style.display === 'flex')) {
              showEmptyState()
            }
          }
        }
      })
      await diaryPromise
    }

    document.getElementById('btn-retry-diary').addEventListener('click', function () {
      loading = false
      noMore = false
      currentPage = 1
      totalLoaded = 0
      document.getElementById('diary-list').innerHTML = ''
      document.getElementById('no-more').style.display = 'none'
      hideAllEmptyStates()
      initDiary()
    })

    initDiary()
  </script>
</body>
</html>
